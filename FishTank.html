<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropical Fish - Pro Aquarium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000b1a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 3px;
            font-weight: 300;
        }

        .controls-hint {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 5px;
        }

        #interaction-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0, 20, 40, 0.6);
            backdrop-filter: blur(15px);
            padding: 12px 25px;
            border-radius: 50px;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        button {
            background: rgba(0, 188, 212, 0.3);
            border: 1px solid rgba(0, 188, 212, 0.5);
            padding: 8px 20px;
            border-radius: 20px;
            color: #e0f7fa;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            outline: none;
        }

        button:hover {
            background: rgba(0, 188, 212, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button:active {
            transform: translateY(0);
        }

        #feed-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.5);
            pointer-events: none;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>TROPICAL FISH</h1>
        <div class="controls-hint">Drag to Look • Scroll to Zoom • Click Water to Feed</div>
    </div>

    <div id="feed-msg">Click anywhere to drop food</div>

    <div id="interaction-overlay">
        <button onclick="addFish()">Add Random Fish</button>
        <button onclick="toggleFeedingMode()" id="feed-btn">Feed Fish</button>
    </div>

    <script>
        let scene, camera, renderer, clock;
        let fishes = [];
        let bubbles = [];
        let foodParticles = [];
        let feedingMode = false;
        
        let isMouseDown = false;
        let targetRotationX = 0.1;
        let targetRotationY = 0;
        let curRotationX = 0.1;
        let curRotationY = 0;

        const baseColors = ['#FF9800', '#2196F3', '#FFEB3B', '#E91E63', '#4CAF50', '#FFFFFF', '#9C27B0'];

        window.onload = function() {
            init();
            animate();
        };

        function init() {
            scene = new THREE.Scene();
            // Use a brighter fallback color for the reef
            scene.background = new THREE.Color(0x004477); 
            // Reduced fog density so the photographic background remains visible
            scene.fog = new THREE.FogExp2(0x004477, 0.012);

            // Load Photographic Background (Mapped to a Cylinder for seamless panorama)
            const textureLoader = new THREE.TextureLoader();
            // Using a consistent, single underwater scene with sunbeams
            textureLoader.load('https://images.unsplash.com/photo-1582967788606-a171c1080cb0?auto=format&fit=crop&w=2000&q=80', function(texture) {
                // Mirror the texture horizontally so there are absolutely no visible seams
                texture.wrapS = THREE.MirroredRepeatWrapping;
                texture.repeat.set(2, 1);
                
                // Use a cylinder instead of a sphere to prevent pinching at the top/bottom
                const bgGeometry = new THREE.CylinderGeometry(150, 150, 150, 64, 1, true);
                const bgMaterial = new THREE.MeshBasicMaterial({
                    map: texture,
                    side: THREE.BackSide,
                    fog: false // Ensure the background image isn't washed out by fog
                });
                const backgroundCylinder = new THREE.Mesh(bgGeometry, bgMaterial);
                backgroundCylinder.position.y = 10;
                scene.add(backgroundCylinder);
            });

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x005577, 1.5);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
            sunLight.position.set(5, 20, 10);
            sunLight.castShadow = true;
            scene.add(sunLight);

            // Caustics Simulation on floor (Changed to Circle to fit the cylinder perfectly)
            const floorGeo = new THREE.CircleGeometry(150, 64);
            const floorMat = new THREE.MeshPhongMaterial({ 
                color: 0xc2b280,
                shininess: 0,
                transparent: true,
                opacity: 0.8 // Blend slightly into the background image
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -8;
            floor.receiveShadow = true;
            scene.add(floor);

            createEnvironment();

            // Initial population
            for (let i = 0; i < 12; i++) addFish();
            for (let i = 0; i < 30; i++) createBubble(true);

            // Input Events
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousedown', (e) => {
                if(e.target.tagName === 'BUTTON') return;
                if(feedingMode) dropFood(e);
                isMouseDown = true;
            });
            document.addEventListener('mouseup', () => isMouseDown = false);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('wheel', (e) => {
                camera.position.z = Math.max(5, Math.min(35, camera.position.z + e.deltaY * 0.01));
            });
        }

        function createEnvironment() {
            // Rocks with varied shapes
            for(let i=0; i<12; i++) {
                const geo = new THREE.DodecahedronGeometry(Math.random() * 3 + 1, 0);
                const mat = new THREE.MeshStandardMaterial({ 
                    color: 0x334455, 
                    roughness: 0.8,
                    flatShading: true
                });
                const rock = new THREE.Mesh(geo, mat);
                rock.position.set((Math.random()-0.5)*40, -8, (Math.random()-0.5)*40);
                rock.rotation.set(Math.random(), Math.random(), Math.random());
                rock.receiveShadow = true;
                scene.add(rock);

                // Add bubbles above some rocks
                if(Math.random() > 0.6) {
                    rock.userData.isBubbleSource = true;
                }
            }

            // Enhanced Seaweed
            for(let i=0; i<60; i++) {
                const height = 2 + Math.random() * 5;
                const geo = new THREE.CylinderGeometry(0.02, 0.1, height, 6);
                const mat = new THREE.MeshPhongMaterial({ color: 0x1b5e20 });
                const weed = new THREE.Mesh(geo, mat);
                weed.position.set((Math.random()-0.5)*50, -8 + height/2, (Math.random()-0.5)*50);
                weed.userData = { 
                    offset: Math.random() * Math.PI,
                    speed: 0.5 + Math.random() 
                };
                scene.add(weed);
            }
        }

        function createFishPattern(patternType, color1, color2) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');

            // Base color
            ctx.fillStyle = color1;
            ctx.fillRect(0, 0, 256, 128);

            // Pattern color
            ctx.fillStyle = color2;
            if (patternType === 'stripes') {
                for (let i = 20; i < 256; i += 40) {
                    ctx.fillRect(i, 0, 20, 128);
                }
            } else if (patternType === 'spots') {
                for (let i = 0; i < 15; i++) {
                    ctx.beginPath();
                    ctx.arc(Math.random() * 256, Math.random() * 128, 8 + Math.random() * 10, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if (patternType === 'half') {
                ctx.fillRect(128, 0, 128, 128);
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        function addFish() {
            const group = new THREE.Group();
            const bodyGroup = new THREE.Group();
            group.add(bodyGroup);
            
            // Randomize overall size (0.5x to 1.5x)
            const sizeMultiplier = 0.5 + Math.random();

            // Generate Pattern and Colors
            const patterns = ['solid', 'stripes', 'spots', 'half'];
            const pType = patterns[Math.floor(Math.random() * patterns.length)];
            const c1 = baseColors[Math.floor(Math.random() * baseColors.length)];
            let c2 = baseColors[Math.floor(Math.random() * baseColors.length)];
            while(c1 === c2) c2 = baseColors[Math.floor(Math.random() * baseColors.length)];
            
            const fishTexture = createFishPattern(pType, c1, c2);

            // 1. Refined Body Shape (Flatter, more natural)
            const bodyGeo = new THREE.SphereGeometry(0.4, 16, 12);
            bodyGeo.scale(1.5, 1, 0.3);
            const bodyMat = new THREE.MeshStandardMaterial({ 
                map: fishTexture,
                roughness: 0.3,
                metalness: 0.2
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            bodyGroup.add(body);

            // 2. Tail Pivot (Inset slightly into the body for a seamless joint)
            const tailPivot = new THREE.Group();
            tailPivot.position.x = -0.45;
            bodyGroup.add(tailPivot);

            // 3. Tail Fin (Diamond shape, narrow at body and wide at back)
            const tailGeo = new THREE.ConeGeometry(0.3, 0.8, 4);
            tailGeo.rotateY(Math.PI/4); // Align to make a diamond
            tailGeo.rotateZ(-Math.PI/2); // Point into the body
            tailGeo.scale(1, 1, 0.1); // Flatten it
            const tail = new THREE.Mesh(tailGeo, bodyMat);
            tail.position.x = -0.4; // Position tip exactly at the pivot
            tailPivot.add(tail);

            // 4. Dorsal Fin (Top)
            const dorsalGeo = new THREE.ConeGeometry(0.2, 0.6, 4);
            dorsalGeo.rotateY(Math.PI/4);
            dorsalGeo.scale(1, 1, 0.1);
            const dorsal = new THREE.Mesh(dorsalGeo, bodyMat);
            dorsal.position.set(-0.1, 0.3, 0);
            dorsal.rotation.z = -Math.PI/6; // Lean back slightly
            bodyGroup.add(dorsal);

            // 5. Pectoral Fins (Sides)
            const pecGeo = new THREE.ConeGeometry(0.15, 0.4, 4);
            pecGeo.rotateY(Math.PI/4);
            pecGeo.rotateZ(-Math.PI/2);
            pecGeo.scale(1, 1, 0.05);
            
            const pecR = new THREE.Mesh(pecGeo, bodyMat);
            pecR.position.set(0.1, -0.1, 0.15);
            pecR.rotation.y = Math.PI / 8;
            pecR.rotation.x = -Math.PI / 8;
            bodyGroup.add(pecR);

            const pecL = new THREE.Mesh(pecGeo, bodyMat);
            pecL.position.set(0.1, -0.1, -0.15);
            pecL.rotation.y = -Math.PI / 8;
            pecL.rotation.x = Math.PI / 8;
            bodyGroup.add(pecL);

            // Eyes
            const eyeGeo = new THREE.SphereGeometry(0.04, 8, 8);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.35, 0.05, 0.12);
            bodyGroup.add(eyeR);
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(0.35, 0.05, -0.12);
            bodyGroup.add(eyeL);

            // Scale entire fish proportionally
            group.scale.set(sizeMultiplier, sizeMultiplier, sizeMultiplier);

            group.position.set((Math.random()-0.5)*25, (Math.random()-0.5)*10, (Math.random()-0.5)*25);
            
            // Speed inversely proportional to size (smaller fish are faster)
            const baseSpeed = 0.05 + (1.5 - sizeMultiplier) * 0.03;

            group.userData = {
                phase: Math.random() * Math.PI * 2,
                speed: baseSpeed + (Math.random() * 0.02),
                bodyGroup: bodyGroup,
                tailPivot: tailPivot,
                pecR: pecR,
                pecL: pecL,
                targetFood: null
            };

            fishes.push(group);
            scene.add(group);
        }

        function createBubble(randomHeight = false) {
            const geo = new THREE.SphereGeometry(0.05 + Math.random() * 0.1, 8, 8);
            const mat = new THREE.MeshPhongMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.4 
            });
            const bubble = new THREE.Mesh(geo, mat);
            bubble.position.set(
                (Math.random()-0.5)*30,
                randomHeight ? (Math.random()-0.5)*16 : -8,
                (Math.random()-0.5)*30
            );
            bubble.userData = { speed: 0.02 + Math.random() * 0.05 };
            bubbles.push(bubble);
            scene.add(bubble);
        }

        function toggleFeedingMode() {
            feedingMode = !feedingMode;
            const btn = document.getElementById('feed-btn');
            const msg = document.getElementById('feed-msg');
            btn.style.background = feedingMode ? "rgba(255, 152, 0, 0.6)" : "";
            btn.innerText = feedingMode ? "Cancel Feeding" : "Feed Fish";
            msg.style.display = feedingMode ? "block" : "none";
        }

        function dropFood(event) {
            // Get 3D coords from screen click
            const vector = new THREE.Vector3(
                (event.clientX / window.innerWidth) * 2 - 1,
                -(event.clientY / window.innerHeight) * 2 + 1,
                0.5
            );
            vector.unproject(camera);
            const dir = vector.sub(camera.position).normalize();
            const distance = -camera.position.z / dir.z;
            const pos = camera.position.clone().add(dir.multiplyScalar(distance));

            const geo = new THREE.SphereGeometry(0.08, 6, 6);
            const mat = new THREE.MeshStandardMaterial({ color: 0x795548 });
            const food = new THREE.Mesh(geo, mat);
            food.position.copy(pos);
            food.userData = { life: 10, vy: -0.02 };
            
            foodParticles.push(food);
            scene.add(food);
        }

        function onMouseMove(event) {
            if (isMouseDown) {
                targetRotationY += event.movementX * 0.005;
                targetRotationX += event.movementY * 0.005;
                targetRotationX = Math.max(-Math.PI/4, Math.min(Math.PI/4, targetRotationX));
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            const delta = clock.getDelta();

            // Camera movement
            curRotationX += (targetRotationX - curRotationX) * 0.1;
            curRotationY += (targetRotationY - curRotationY) * 0.1;
            const dist = camera.position.length();
            camera.position.x = dist * Math.sin(curRotationY) * Math.cos(curRotationX);
            camera.position.y = dist * Math.sin(curRotationX);
            camera.position.z = dist * Math.cos(curRotationY) * Math.cos(curRotationX);
            camera.lookAt(0, 0, 0);

            // Update Bubbles
            for(let i = bubbles.length - 1; i >= 0; i--) {
                const b = bubbles[i];
                b.position.y += b.userData.speed;
                b.position.x += Math.sin(time + b.position.y) * 0.01;
                if(b.position.y > 10) {
                    b.position.y = -8;
                    b.position.x = (Math.random()-0.5)*40;
                    b.position.z = (Math.random()-0.5)*40;
                }
            }

            // Update Food
            for(let i = foodParticles.length - 1; i >= 0; i--) {
                const f = foodParticles[i];
                f.position.y += f.userData.vy;
                if(f.position.y < -7.8) {
                    scene.remove(f);
                    foodParticles.splice(i, 1);
                }
            }

            // Update Fish
            fishes.forEach(fish => {
                const data = fish.userData;
                
                // Spine wave motion (Biomechanical swimming)
                // Speed influences the wagging frequency
                const timeFactor = time * (data.speed * 200) + data.phase;
                
                // Body yaws slightly
                data.bodyGroup.rotation.y = Math.sin(timeFactor) * 0.12;
                // Tail pivots heavily with a phase delay (creates a traveling S-curve)
                data.tailPivot.rotation.y = Math.sin(timeFactor - 1.2) * 0.35;
                
                // Pectoral fins paddle
                data.pecR.rotation.y =  Math.PI/8 + Math.sin(timeFactor) * 0.15;
                data.pecL.rotation.y = -Math.PI/8 - Math.sin(timeFactor) * 0.15;

                // Simple AI: Seek food or wander
                let moveTarget = null;
                if(foodParticles.length > 0) {
                    let closest = null;
                    let minDist = 8;
                    foodParticles.forEach(food => {
                        const d = fish.position.distanceTo(food.position);
                        if(d < minDist) { minDist = d; closest = food; }
                    });
                    if(closest) {
                        moveTarget = closest.position;
                        // "Eat" food
                        if(minDist < 0.5) {
                            scene.remove(closest);
                            foodParticles.splice(foodParticles.indexOf(closest), 1);
                        }
                    }
                }

                if(moveTarget) {
                    const toFood = new THREE.Vector3().subVectors(moveTarget, fish.position).normalize();
                    const targetQuat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(1,0,0), toFood);
                    fish.quaternion.slerp(targetQuat, 0.05);
                    fish.position.addScaledVector(toFood, data.speed * 1.5);
                } else {
                    // Wandering logic
                    const direction = new THREE.Vector3(1, 0, 0).applyQuaternion(fish.quaternion);
                    fish.position.addScaledVector(direction, data.speed);

                    const bounds = 18;
                    if (Math.abs(fish.position.x) > bounds || Math.abs(fish.position.y) > 8 || Math.abs(fish.position.z) > bounds) {
                        const toCenter = new THREE.Vector3(0,0,0).sub(fish.position).normalize();
                        const turnQuat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(1,0,0), toCenter);
                        fish.quaternion.slerp(turnQuat, 0.03);
                    } else if (Math.random() > 0.99) {
                        data.wanderQuat = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, fish.rotation.y + (Math.random()-0.5)*2, 0));
                    }
                    
                    if(data.wanderQuat) fish.quaternion.slerp(data.wanderQuat, 0.01);
                }
            });

            // Animate seaweed
            scene.children.forEach(child => {
                if(child.userData && child.userData.offset !== undefined) {
                    child.rotation.x = Math.sin(time * child.userData.speed + child.userData.offset) * 0.15;
                }
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
