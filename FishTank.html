<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropical Fish - Pro Aquarium</title>
    <!-- Core Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Post-Processing Modules -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/BokehShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/BokehPass.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000b1a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 3px;
            font-weight: 300;
        }

        .controls-hint {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 5px;
        }

        #interaction-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            background: rgba(0, 20, 40, 0.6);
            backdrop-filter: blur(15px);
            padding: 12px 25px;
            border-radius: 50px;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
            width: max-content;
            max-width: 90vw;
        }

        button {
            background: rgba(0, 188, 212, 0.3);
            border: 1px solid rgba(0, 188, 212, 0.5);
            padding: 8px 16px;
            border-radius: 20px;
            color: #e0f7fa;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            outline: none;
            font-size: 13px;
        }

        button:hover {
            background: rgba(0, 188, 212, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button:active {
            transform: translateY(0);
        }

        #feed-btn {
            background: rgba(255, 152, 0, 0.3);
            border-color: rgba(255, 152, 0, 0.5);
        }
        #feed-btn:hover {
            background: rgba(255, 152, 0, 0.6);
        }

        #feed-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.7);
            pointer-events: none;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            display: none;
            text-shadow: 0 2px 10px rgba(0,0,0,1);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>TROPICAL FISH</h1>
        <div class="controls-hint">Drag to Look • Scroll to Zoom • Click Water to Feed</div>
    </div>

    <div id="feed-msg">Click anywhere to drop food</div>

    <div id="interaction-overlay">
        <button onclick="addFish()">+ Fish</button>
        <button onclick="addCrab()">+ Crab</button>
        <button onclick="addJellyfish()">+ Jellyfish</button>
        <button onclick="toggleFeedingMode()" id="feed-btn">Feed Tank</button>
    </div>

    <script>
        let scene, camera, renderer, clock;
        let composer, bokehPass;
        let fishes = [];
        let crabs = [];
        let jellyfishes = [];
        let bubbles = [];
        let foodParticles = [];
        let feedingMode = false;
        
        let isMouseDown = false;
        let targetRotationX = 0.1;
        let targetRotationY = 0;
        let curRotationX = 0.1;
        let curRotationY = 0;

        const baseColors = ['#FF9800', '#2196F3', '#FFEB3B', '#E91E63', '#4CAF50', '#FFFFFF', '#9C27B0'];

        window.onload = function() {
            init();
            animate();
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x004477); 
            scene.fog = new THREE.FogExp2(0x004477, 0.012);

            // Load Photographic Background
            const textureLoader = new THREE.TextureLoader();
            textureLoader.load('https://images.unsplash.com/photo-1582967788606-a171c1080cb0?auto=format&fit=crop&w=2000&q=80', function(texture) {
                texture.wrapS = THREE.MirroredRepeatWrapping;
                texture.repeat.set(2, 1);
                const bgGeometry = new THREE.CylinderGeometry(150, 150, 150, 64, 1, true);
                const bgMaterial = new THREE.MeshBasicMaterial({
                    map: texture,
                    side: THREE.BackSide,
                    fog: false
                });
                const backgroundCylinder = new THREE.Mesh(bgGeometry, bgMaterial);
                backgroundCylinder.position.y = 10;
                scene.add(backgroundCylinder);
            });

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Lighting (Toned down to prevent washing out the bloom)
            const ambientLight = new THREE.AmbientLight(0x005577, 0.8);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
            sunLight.position.set(5, 20, 10);
            sunLight.castShadow = true;
            scene.add(sunLight);

            // Subtle bottom light for jellyfish translucency
            const bottomLight = new THREE.PointLight(0x00aaff, 0.8, 50);
            bottomLight.position.set(0, -5, 0);
            scene.add(bottomLight);

            // Caustics Simulation on floor
            const floorGeo = new THREE.CircleGeometry(150, 64);
            const floorMat = new THREE.MeshPhongMaterial({ 
                color: 0xc2b280,
                shininess: 0,
                transparent: true,
                opacity: 0.8 
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -8;
            floor.receiveShadow = true;
            scene.add(floor);

            createEnvironment();

            // Initial population (Increased for Flocking effect)
            for (let i = 0; i < 25; i++) addFish();
            for (let i = 0; i < 4; i++) addCrab();
            for (let i = 0; i < 3; i++) addJellyfish();
            for (let i = 0; i < 30; i++) createBubble(true);

            // Post-Processing Pipeline setup
            setupPostProcessing();

            // Input Events
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousedown', (e) => {
                if(e.target.tagName === 'BUTTON') return;
                if(feedingMode) dropFood(e);
                isMouseDown = true;
            });
            document.addEventListener('mouseup', () => isMouseDown = false);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('wheel', (e) => {
                camera.position.z = Math.max(5, Math.min(35, camera.position.z + e.deltaY * 0.01));
            });
        }

        function setupPostProcessing() {
            const renderScene = new THREE.RenderPass(scene, camera);

            // Bloom for glowing colors - Fixed settings for realism
            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.95; // Increased so only the absolute brightest highlights glow
            bloomPass.strength = 0.25;  // Reduced intensity for a subtle, natural look
            bloomPass.radius = 0.1;

            // Bokeh (Depth of Field) to blur background
            bokehPass = new THREE.BokehPass(scene, camera, {
                focus: 15.0, // Will be dynamically updated based on camera distance
                aperture: 0.0005, // Drastically reduced for a much wider depth of field (more in focus)
                maxblur: 0.004,   // Lowered maximum blur so things don't get completely washed out
                width: window.innerWidth,
                height: window.innerHeight
            });

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
            composer.addPass(bokehPass);
        }

        function createEnvironment() {
            for(let i=0; i<12; i++) {
                const geo = new THREE.DodecahedronGeometry(Math.random() * 3 + 1, 0);
                const mat = new THREE.MeshStandardMaterial({ color: 0x334455, roughness: 0.8, flatShading: true });
                const rock = new THREE.Mesh(geo, mat);
                rock.position.set((Math.random()-0.5)*40, -8, (Math.random()-0.5)*40);
                rock.rotation.set(Math.random(), Math.random(), Math.random());
                rock.receiveShadow = true;
                scene.add(rock);
                if(Math.random() > 0.6) rock.userData.isBubbleSource = true;
            }

            for(let i=0; i<60; i++) {
                const height = 2 + Math.random() * 5;
                const geo = new THREE.CylinderGeometry(0.02, 0.1, height, 6);
                const mat = new THREE.MeshPhongMaterial({ color: 0x1b5e20 });
                const weed = new THREE.Mesh(geo, mat);
                weed.position.set((Math.random()-0.5)*50, -8 + height/2, (Math.random()-0.5)*50);
                weed.userData = { offset: Math.random() * Math.PI, speed: 0.5 + Math.random() };
                scene.add(weed);
            }
        }

        function createFishPattern(patternType, color1, color2) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color1;
            ctx.fillRect(0, 0, 256, 128);
            ctx.fillStyle = color2;
            if (patternType === 'stripes') {
                for (let i = 20; i < 256; i += 40) ctx.fillRect(i, 0, 20, 128);
            } else if (patternType === 'spots') {
                for (let i = 0; i < 15; i++) {
                    ctx.beginPath();
                    ctx.arc(Math.random() * 256, Math.random() * 128, 8 + Math.random() * 10, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if (patternType === 'half') {
                ctx.fillRect(128, 0, 128, 128);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        function addFish() {
            const group = new THREE.Group();
            const bodyGroup = new THREE.Group();
            group.add(bodyGroup);
            
            const sizeMultiplier = 0.5 + Math.random();
            const patterns = ['solid', 'stripes', 'spots', 'half'];
            const pType = patterns[Math.floor(Math.random() * patterns.length)];
            const c1 = baseColors[Math.floor(Math.random() * baseColors.length)];
            let c2 = baseColors[Math.floor(Math.random() * baseColors.length)];
            while(c1 === c2) c2 = baseColors[Math.floor(Math.random() * baseColors.length)];
            
            const fishTexture = createFishPattern(pType, c1, c2);

            const bodyGeo = new THREE.SphereGeometry(0.4, 16, 12);
            bodyGeo.scale(1.5, 1, 0.3);
            const bodyMat = new THREE.MeshStandardMaterial({ map: fishTexture, roughness: 0.3, metalness: 0.2 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            bodyGroup.add(body);

            const tailPivot = new THREE.Group();
            tailPivot.position.x = -0.45;
            bodyGroup.add(tailPivot);

            const tailGeo = new THREE.ConeGeometry(0.3, 0.8, 4);
            tailGeo.rotateY(Math.PI/4); 
            tailGeo.rotateZ(-Math.PI/2); 
            tailGeo.scale(1, 1, 0.1); 
            const tail = new THREE.Mesh(tailGeo, bodyMat);
            tail.position.x = -0.4; 
            tailPivot.add(tail);

            const dorsalGeo = new THREE.ConeGeometry(0.2, 0.6, 4);
            dorsalGeo.rotateY(Math.PI/4);
            dorsalGeo.scale(1, 1, 0.1);
            const dorsal = new THREE.Mesh(dorsalGeo, bodyMat);
            dorsal.position.set(-0.1, 0.3, 0);
            dorsal.rotation.z = -Math.PI/6; 
            bodyGroup.add(dorsal);

            const pecGeo = new THREE.ConeGeometry(0.15, 0.4, 4);
            pecGeo.rotateY(Math.PI/4);
            pecGeo.rotateZ(-Math.PI/2);
            pecGeo.scale(1, 1, 0.05);
            
            const pecR = new THREE.Mesh(pecGeo, bodyMat);
            pecR.position.set(0.1, -0.1, 0.15);
            pecR.rotation.y = Math.PI / 8;
            pecR.rotation.x = -Math.PI / 8;
            bodyGroup.add(pecR);

            const pecL = new THREE.Mesh(pecGeo, bodyMat);
            pecL.position.set(0.1, -0.1, -0.15);
            pecL.rotation.y = -Math.PI / 8;
            pecL.rotation.x = Math.PI / 8;
            bodyGroup.add(pecL);

            const eyeGeo = new THREE.SphereGeometry(0.04, 8, 8);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.35, 0.05, 0.12);
            bodyGroup.add(eyeR);
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(0.35, 0.05, -0.12);
            bodyGroup.add(eyeL);

            group.scale.set(sizeMultiplier, sizeMultiplier, sizeMultiplier);
            group.position.set((Math.random()-0.5)*25, (Math.random()-0.5)*10, (Math.random()-0.5)*25);
            
            const baseSpeed = 0.04 + (1.5 - sizeMultiplier) * 0.02;

            // Updated UserData for Boids Flocking Logic
            group.userData = {
                phase: Math.random() * Math.PI * 2,
                maxSpeed: baseSpeed + (Math.random() * 0.02),
                maxForce: 0.002 + (Math.random() * 0.001), // Determines how fast they can turn
                velocity: new THREE.Vector3((Math.random()-0.5), (Math.random()-0.5), (Math.random()-0.5)).normalize().multiplyScalar(baseSpeed),
                bodyGroup: bodyGroup,
                tailPivot: tailPivot,
                pecR: pecR,
                pecL: pecL
            };

            fishes.push(group);
            scene.add(group);
        }

        function addCrab() {
            const crabGroup = new THREE.Group();
            const crabMat = new THREE.MeshStandardMaterial({ color: 0xcc4422, roughness: 0.8 });
            
            const bodyGeo = new THREE.SphereGeometry(0.5, 16, 12);
            bodyGeo.scale(0.8, 0.4, 1.4); 
            const body = new THREE.Mesh(bodyGeo, crabMat);
            body.position.y = 0.2;
            crabGroup.add(body);

            const stalkGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.2);
            const eyeMat = new THREE.MeshBasicMaterial({color: 0x000000});
            const eyeGeo = new THREE.SphereGeometry(0.05, 8, 8);

            const stalkR = new THREE.Mesh(stalkGeo, crabMat);
            stalkR.position.set(0.3, 0.4, 0.2); 
            stalkR.rotation.z = -Math.PI / 6;
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0, 0.1, 0);
            stalkR.add(eyeR);
            crabGroup.add(stalkR);

            const stalkL = new THREE.Mesh(stalkGeo, crabMat);
            stalkL.position.set(0.3, 0.4, -0.2); 
            stalkL.rotation.z = -Math.PI / 6;
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(0, 0.1, 0);
            stalkL.add(eyeL);
            crabGroup.add(stalkL);

            const clawArmGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.3, 8);
            const clawPincerGeo = new THREE.ConeGeometry(0.1, 0.3, 8);
            
            const clawR = new THREE.Group();
            clawR.position.set(0.4, 0.2, 0.6);
            const armR = new THREE.Mesh(clawArmGeo, crabMat);
            armR.rotation.x = Math.PI / 2;
            armR.rotation.y = Math.PI / 4;
            const pincerR = new THREE.Mesh(clawPincerGeo, crabMat);
            pincerR.position.set(0.15, 0, 0.15);
            pincerR.rotation.x = Math.PI / 2;
            pincerR.rotation.z = -Math.PI / 4;
            clawR.add(armR);
            clawR.add(pincerR);
            crabGroup.add(clawR);

            const clawL = new THREE.Group();
            clawL.position.set(0.4, 0.2, -0.6);
            const armL = new THREE.Mesh(clawArmGeo, crabMat);
            armL.rotation.x = Math.PI / 2;
            armL.rotation.y = -Math.PI / 4;
            const pincerL = new THREE.Mesh(clawPincerGeo, crabMat);
            pincerL.position.set(0.15, 0, -0.15);
            pincerL.rotation.x = -Math.PI / 2;
            pincerL.rotation.z = -Math.PI / 4;
            clawL.add(armL);
            clawL.add(pincerL);
            crabGroup.add(clawL);

            const legsGroup = new THREE.Group();
            const legGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.4, 8);
            
            for(let i=0; i<4; i++) {
                const xOffset = 0.2 - (i * 0.2); 
                const legR = new THREE.Mesh(legGeo, crabMat);
                legR.position.set(xOffset, 0.15, 0.6);
                legR.rotation.x = Math.PI / 3; 
                legR.rotation.z = (Math.PI / 12) * (1.5 - i); 
                legsGroup.add(legR);

                const legL = new THREE.Mesh(legGeo, crabMat);
                legL.position.set(xOffset, 0.15, -0.6);
                legL.rotation.x = -Math.PI / 3;
                legL.rotation.z = (Math.PI / 12) * (1.5 - i);
                legsGroup.add(legL);
            }
            crabGroup.add(legsGroup);

            crabGroup.position.set((Math.random()-0.5)*30, -7.9, (Math.random()-0.5)*30);
            const size = 0.5 + Math.random() * 0.3;
            crabGroup.scale.set(size, size, size);

            crabGroup.userData = {
                phase: Math.random() * Math.PI * 2,
                speed: 0.015 + Math.random() * 0.015,
                legsGroup: legsGroup,
                targetRotation: Math.random() * Math.PI * 2,
                stateTime: 0,
                moveDirToggle: Math.random() > 0.5 ? 1 : -1 
            };

            crabs.push(crabGroup);
            scene.add(crabGroup);
        }

        function addJellyfish() {
            const jellyGroup = new THREE.Group();
            
            const domeGeo = new THREE.SphereGeometry(0.6, 16, 16, 0, Math.PI * 2, 0, Math.PI / 2);
            const jellyColors = [0x00ffff, 0xff88ff, 0xaaffff];
            const jColor = jellyColors[Math.floor(Math.random() * jellyColors.length)];
            
            const jellyMat = new THREE.MeshPhysicalMaterial({ 
                color: jColor,
                transparent: true,
                opacity: 0.6,
                roughness: 0.1,
                transmission: 0.9,
                thickness: 0.5,
                side: THREE.DoubleSide
            });
            const dome = new THREE.Mesh(domeGeo, jellyMat);
            jellyGroup.add(dome);

            const tentacleGroup = new THREE.Group();
            const tentacleMat = new THREE.MeshBasicMaterial({ color: jColor, transparent: true, opacity: 0.5 });
            const tentacleGeo = new THREE.CylinderGeometry(0.01, 0.005, 1.5, 4);
            tentacleGeo.translate(0, -0.75, 0); 

            for(let i=0; i<6; i++) {
                const tentacle = new THREE.Mesh(tentacleGeo, tentacleMat);
                const angle = (i / 6) * Math.PI * 2;
                tentacle.position.set(Math.cos(angle)*0.3, 0, Math.sin(angle)*0.3);
                tentacle.userData = { offset: i * 0.5 };
                tentacleGroup.add(tentacle);
            }
            jellyGroup.add(tentacleGroup);

            const size = 0.8 + Math.random() * 0.7;
            jellyGroup.scale.set(size, size, size);
            jellyGroup.position.set((Math.random()-0.5)*25, (Math.random()-0.5)*10, (Math.random()-0.5)*25);

            jellyGroup.userData = {
                phase: Math.random() * Math.PI * 2,
                speed: 0.005 + Math.random() * 0.005,
                dome: dome,
                tentacleGroup: tentacleGroup,
                baseY: jellyGroup.position.y
            };

            jellyfishes.push(jellyGroup);
            scene.add(jellyGroup);
        }

        function createBubble(randomHeight = false) {
            const geo = new THREE.SphereGeometry(0.05 + Math.random() * 0.1, 8, 8);
            const mat = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 });
            const bubble = new THREE.Mesh(geo, mat);
            bubble.position.set(
                (Math.random()-0.5)*30,
                randomHeight ? (Math.random()-0.5)*16 : -8,
                (Math.random()-0.5)*30
            );
            bubble.userData = { speed: 0.02 + Math.random() * 0.05 };
            bubbles.push(bubble);
            scene.add(bubble);
        }

        function toggleFeedingMode() {
            feedingMode = !feedingMode;
            const btn = document.getElementById('feed-btn');
            const msg = document.getElementById('feed-msg');
            btn.style.background = feedingMode ? "rgba(255, 152, 0, 0.6)" : "";
            btn.innerText = feedingMode ? "Cancel Feeding" : "Feed Tank";
            msg.style.display = feedingMode ? "block" : "none";
        }

        function dropFood(event) {
            const vector = new THREE.Vector3(
                (event.clientX / window.innerWidth) * 2 - 1,
                -(event.clientY / window.innerHeight) * 2 + 1,
                0.5
            );
            vector.unproject(camera);
            const dir = vector.sub(camera.position).normalize();
            const distance = -camera.position.z / dir.z;
            const pos = camera.position.clone().add(dir.multiplyScalar(distance));

            const geo = new THREE.SphereGeometry(0.08, 6, 6);
            const mat = new THREE.MeshStandardMaterial({ color: 0x795548 });
            const food = new THREE.Mesh(geo, mat);
            food.position.copy(pos);
            food.userData = { life: 10, vy: -0.02 };
            
            foodParticles.push(food);
            scene.add(food);
        }

        function onMouseMove(event) {
            if (isMouseDown) {
                targetRotationY += event.movementX * 0.005;
                targetRotationX += event.movementY * 0.005;
                targetRotationX = Math.max(-Math.PI/4, Math.min(Math.PI/4, targetRotationX));
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if(composer) composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Camera movement
            curRotationX += (targetRotationX - curRotationX) * 0.1;
            curRotationY += (targetRotationY - curRotationY) * 0.1;
            const dist = camera.position.length();
            camera.position.x = dist * Math.sin(curRotationY) * Math.cos(curRotationX);
            camera.position.y = dist * Math.sin(curRotationX);
            camera.position.z = dist * Math.cos(curRotationY) * Math.cos(curRotationX);
            camera.lookAt(0, 0, 0);

            // Dynamically update the focal depth of the lens to keep the center of the tank sharp
            if(bokehPass) {
                bokehPass.uniforms['focus'].value = camera.position.length();
            }

            // Update Bubbles
            for(let i = bubbles.length - 1; i >= 0; i--) {
                const b = bubbles[i];
                b.position.y += b.userData.speed;
                b.position.x += Math.sin(time + b.position.y) * 0.01;
                if(b.position.y > 10) {
                    b.position.y = -8;
                    b.position.x = (Math.random()-0.5)*40;
                    b.position.z = (Math.random()-0.5)*40;
                }
            }

            // Update Food
            for(let i = foodParticles.length - 1; i >= 0; i--) {
                const f = foodParticles[i];
                f.position.y += f.userData.vy;
                if(f.position.y < -7.8) {
                    scene.remove(f);
                    foodParticles.splice(i, 1);
                }
            }

            // Update Fish (With Flocking / Boids AI)
            fishes.forEach(fish => {
                const data = fish.userData;
                const speed = data.velocity.length();
                const timeFactor = time * (speed * 200) + data.phase;
                
                // Wagging animation based on real speed
                data.bodyGroup.rotation.y = Math.sin(timeFactor) * 0.12;
                data.tailPivot.rotation.y = Math.sin(timeFactor - 1.2) * 0.35;
                data.pecR.rotation.y =  Math.PI/8 + Math.sin(timeFactor) * 0.15;
                data.pecL.rotation.y = -Math.PI/8 - Math.sin(timeFactor) * 0.15;

                let moveTarget = null;
                if(foodParticles.length > 0) {
                    let closest = null;
                    let minDist = 8;
                    foodParticles.forEach(food => {
                        const d = fish.position.distanceTo(food.position);
                        if(d < minDist) { minDist = d; closest = food; }
                    });
                    if(closest) {
                        moveTarget = closest.position;
                        if(minDist < 0.5) {
                            scene.remove(closest);
                            foodParticles.splice(foodParticles.indexOf(closest), 1);
                        }
                    }
                }

                let acceleration = new THREE.Vector3();

                if(moveTarget) {
                    // Feeding overrides flocking
                    let desired = new THREE.Vector3().subVectors(moveTarget, fish.position).normalize().multiplyScalar(data.maxSpeed * 1.5);
                    let steer = new THREE.Vector3().subVectors(desired, data.velocity);
                    steer.clampLength(0, data.maxForce * 4); // Quick turns for food
                    acceleration.add(steer);
                } else {
                    // Flocking Logic (Separation, Alignment, Cohesion)
                    let separation = new THREE.Vector3();
                    let alignment = new THREE.Vector3();
                    let cohesion = new THREE.Vector3();
                    let flockCount = 0;

                    fishes.forEach(other => {
                        if (other !== fish) {
                            let d = fish.position.distanceTo(other.position);
                            if (d > 0 && d < 5.0) { // Perception radius
                                let diff = new THREE.Vector3().subVectors(fish.position, other.position).normalize().divideScalar(d);
                                separation.add(diff);
                                alignment.add(other.userData.velocity);
                                cohesion.add(other.position);
                                flockCount++;
                            }
                        }
                    });

                    if (flockCount > 0) {
                        separation.divideScalar(flockCount).normalize().multiplyScalar(data.maxSpeed).sub(data.velocity).clampLength(0, data.maxForce * 1.5);
                        alignment.divideScalar(flockCount).normalize().multiplyScalar(data.maxSpeed).sub(data.velocity).clampLength(0, data.maxForce);
                        cohesion.divideScalar(flockCount).sub(fish.position).normalize().multiplyScalar(data.maxSpeed).sub(data.velocity).clampLength(0, data.maxForce);

                        acceleration.add(separation.multiplyScalar(2.0)); // Highly value personal space
                        acceleration.add(alignment.multiplyScalar(1.0));
                        acceleration.add(cohesion.multiplyScalar(0.8));
                    }

                    // Soft Tank Boundaries
                    const bounds = 18;
                    if (Math.abs(fish.position.x) > bounds || Math.abs(fish.position.y) > 8 || Math.abs(fish.position.z) > bounds) {
                        let steerToCenter = new THREE.Vector3(0,0,0).sub(fish.position).normalize().multiplyScalar(data.maxSpeed).sub(data.velocity).clampLength(0, data.maxForce * 2.5);
                        acceleration.add(steerToCenter);
                    }
                }

                // Apply Physics
                data.velocity.add(acceleration);
                data.velocity.clampLength(0, data.maxSpeed * (moveTarget ? 1.5 : 1.0));
                fish.position.add(data.velocity);

                // Smoothly orient fish to face velocity direction
                if (data.velocity.lengthSq() > 0.00001) {
                    const targetQuat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(1,0,0), data.velocity.clone().normalize());
                    fish.quaternion.slerp(targetQuat, 0.08);
                }
            });

            // Update Crabs
            crabs.forEach(crab => {
                const data = crab.userData;
                data.stateTime++;

                data.legsGroup.children.forEach((leg, i) => {
                    const isRight = i % 2 === 0;
                    const legIndex = Math.floor(i / 2);
                    const baseRotX = isRight ? Math.PI / 3 : -Math.PI / 3;
                    const baseRotZ = (Math.PI / 12) * (1.5 - legIndex);
                    const phaseOffset = (legIndex % 2 === 0) ? 0 : Math.PI;
                    leg.rotation.z = baseRotZ + Math.sin(time * 25 + phaseOffset) * 0.15;
                    leg.rotation.x = baseRotX + Math.cos(time * 25 + phaseOffset) * 0.1 * (isRight ? -1 : 1);
                });

                if(data.stateTime > 200 && Math.random() > 0.95) {
                    if (Math.random() > 0.4) {
                        data.moveDirToggle *= -1; 
                    } else {
                        data.targetRotation = Math.random() * Math.PI * 2; 
                    }
                    data.stateTime = 0;
                }

                crab.rotation.y += (data.targetRotation - crab.rotation.y) * 0.05;

                const sidewaysAngle = crab.rotation.y + (Math.PI / 2);
                const direction = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0,1,0), sidewaysAngle);
                
                crab.position.addScaledVector(direction, data.speed * data.moveDirToggle);

                const bound = 25;
                if (Math.abs(crab.position.x) > bound || Math.abs(crab.position.z) > bound) {
                    data.moveDirToggle *= -1; 
                    data.targetRotation += Math.PI / 2; 
                    crab.position.x = Math.max(-bound, Math.min(bound, crab.position.x));
                    crab.position.z = Math.max(-bound, Math.min(bound, crab.position.z));
                }
            });

            // Update Jellyfish
            jellyfishes.forEach(jelly => {
                const data = jelly.userData;
                const timeFactor = time * 2 + data.phase;

                const pulse = 1 + Math.sin(timeFactor) * 0.1;
                data.dome.scale.set(pulse, pulse, pulse);

                jelly.position.y = data.baseY + Math.sin(timeFactor * 0.5) * 2;
                jelly.position.x += Math.sin(timeFactor * 0.3) * data.speed;
                jelly.position.z += Math.cos(timeFactor * 0.4) * data.speed;

                data.tentacleGroup.children.forEach(tentacle => {
                    tentacle.rotation.x = Math.sin(timeFactor + tentacle.userData.offset) * 0.2;
                    tentacle.rotation.z = Math.cos(timeFactor + tentacle.userData.offset) * 0.2;
                });

                const bound = 20;
                if(Math.abs(jelly.position.x) > bound) jelly.position.x = Math.sign(jelly.position.x) * bound;
                if(Math.abs(jelly.position.z) > bound) jelly.position.z = Math.sign(jelly.position.z) * bound;
                if(data.baseY > 6) data.baseY = 6;
                if(data.baseY < -4) data.baseY = -4;
            });

            // Animate seaweed
            scene.children.forEach(child => {
                if(child.userData && child.userData.offset !== undefined) {
                    child.rotation.x = Math.sin(time * child.userData.speed + child.userData.offset) * 0.15;
                }
            });

            // Use Post-Processing Composer instead of standard renderer
            if (composer) {
                composer.render();
            } else {
                renderer.render(scene, camera);
            }
        }
    </script>
</body>
