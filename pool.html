<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emerald Pocket Pro - English Edition</title>
    <style>
        :root {
            --felt-color: #1a4d2e;
            --wood-color: #2b1d0e;
            --gold: #ffd700;
            --ui-bg: rgba(0, 0, 0, 0.85);
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        #game-container {
            position: relative;
            width: 98vw;
            max-width: 1100px;
            aspect-ratio: 2 / 1;
            box-shadow: 0 0 100px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.6);
            border: 18px solid var(--wood-color);
            border-radius: 10px;
            box-sizing: border-box;
            background: var(--felt-color);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: -55px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .stats-panel {
            background: var(--ui-bg);
            padding: 6px 25px;
            border-radius: 8px 8px 0 0;
            border: 1px solid #333;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 1px;
            display: flex;
            gap: 25px;
            pointer-events: auto;
            text-transform: uppercase;
        }

        #side-controls {
            position: absolute;
            right: -80px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }

        .spin-control {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
            border-radius: 50%;
            position: relative;
            border: 4px solid var(--wood-color);
            cursor: crosshair;
            pointer-events: auto;
            box-shadow: 0 6px 15px rgba(0,0,0,0.7);
        }

        #spin-dot {
            width: 10px;
            height: 10px;
            background: #ff0000;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 5px rgba(255,0,0,0.5);
        }

        .power-bar-container {
            width: 20px;
            height: 180px;
            background: #111;
            border: 2px solid #444;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        #power-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #00ff88, #fbff00, #ff3c00);
            transition: height 0.05s linear;
        }

        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--ui-bg);
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 100;
            border: 2px solid var(--gold);
            box-shadow: 0 0 50px rgba(0,0,0,1);
            min-width: 280px;
        }

        .btn {
            background: var(--gold);
            color: black;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 20px;
            pointer-events: auto;
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div class="stats-panel">
            <span>Score: <span id="score" style="color:var(--gold)">0</span></span>
            <span>Status: <span id="status">Ready</span></span>
        </div>
    </div>

    <canvas id="poolCanvas"></canvas>

    <div id="side-controls">
        <div class="spin-control" id="spin-pad" title="Cue Spin">
            <div id="spin-dot"></div>
        </div>
        <div class="power-bar-container">
            <div id="power-fill"></div>
        </div>
    </div>

    <div id="message-box">
        <h2 id="msg-title" style="margin-top:0; color:var(--gold)">SCRATCH!</h2>
        <p id="msg-body">Cue ball potted.</p>
        <button class="btn" onclick="hideMessage()">BACK TO TABLE</button>
    </div>
</div>

<script>
    // Audio Context
    let audioCtx = null;
    function playClack(volume = 1) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(250 + Math.random() * 150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.08);
        gain.gain.setValueAtTime(Math.min(volume, 0.4), audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.08);
    }

    const canvas = document.getElementById('poolCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const statusEl = document.getElementById('status');
    const powerFill = document.getElementById('power-fill');
    const spinPad = document.getElementById('spin-pad');
    const spinDot = document.getElementById('spin-dot');

    // CONFIG
    const BALL_RADIUS = 18; 
    const FRICTION = 0.99;
    const WALL_BOUNCE = 0.7;
    const TABLE_MARGIN = 28;
    
    let tableWidth, tableHeight;
    let balls = [];
    let cueBall = null;
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    let dragCurrent = { x: 0, y: 0 };
    let isMoving = false;
    let score = 0;
    let english = { x: 0, y: 0 };

    class Ball {
        constructor(x, y, color, label, type = 'solid') {
            this.x = x;
            this.y = y;
            this.vx = 0;
            this.vy = 0;
            this.color = color;
            this.label = label;
            this.type = type; 
            this.isCue = type === 'cue';
            this.inPocket = false;
            this.spinX = 0;
            this.spinY = 0;
        }

        draw(opacity = 1) {
            if (this.inPocket) return;

            ctx.save();
            ctx.globalAlpha = opacity;
            
            // Shadow
            ctx.beginPath();
            ctx.arc(this.x + 5, this.y + 5, BALL_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            ctx.fill();

            // Render Ball Surface
            if (this.type === 'stripe') {
                ctx.beginPath();
                ctx.arc(this.x, this.y, BALL_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = '#f0f0f0';
                ctx.fill();
                
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, BALL_RADIUS, 0, Math.PI * 2);
                ctx.clip();
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - BALL_RADIUS, this.y - BALL_RADIUS * 0.5, BALL_RADIUS * 2, BALL_RADIUS);
                ctx.restore();
            } else {
                ctx.beginPath();
                ctx.arc(this.x, this.y, BALL_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            const shine = ctx.createRadialGradient(
                this.x - BALL_RADIUS*0.3, this.y - BALL_RADIUS*0.3, BALL_RADIUS*0.1,
                this.x, this.y, BALL_RADIUS
            );
            shine.addColorStop(0, 'rgba(255,255,255,0.8)');
            shine.addColorStop(0.3, 'rgba(255,255,255,0)');
            shine.addColorStop(1, 'rgba(0,0,0,0.5)');
            ctx.beginPath();
            ctx.arc(this.x, this.y, BALL_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = shine;
            ctx.fill();

            if (!this.isCue) {
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.x, this.y, BALL_RADIUS * 0.45, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.font = `bold ${BALL_RADIUS * 0.7}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.label, this.x, this.y);
            }
            ctx.restore();
        }

        update() {
            if (this.inPocket) return;

            this.x += this.vx;
            this.y += this.vy;

            this.vx += this.spinX * 0.015;
            this.vy += this.spinY * 0.015;
            this.spinX *= 0.94;
            this.spinY *= 0.94;

            this.vx *= FRICTION;
            this.vy *= FRICTION;

            if (Math.hypot(this.vx, this.vy) < 0.15) { this.vx = 0; this.vy = 0; }

            // IMPROVED COLLISION GAPS FOR POCKETS
            const left = TABLE_MARGIN + BALL_RADIUS;
            const right = tableWidth - TABLE_MARGIN - BALL_RADIUS;
            const top = TABLE_MARGIN + BALL_RADIUS;
            const bottom = tableHeight - TABLE_MARGIN - BALL_RADIUS;

            // Define pocket threshold (don't bounce if near a pocket)
            const pocketEntry = TABLE_MARGIN * 2; 

            // Horizontal Wall Bounce
            if (this.y < top || this.y > bottom) {
                const inCorner = this.x < pocketEntry || this.x > tableWidth - pocketEntry;
                const inSide = Math.abs(this.x - tableWidth/2) < TABLE_MARGIN * 1.2;
                
                if (!inCorner && !inSide) {
                    this.vy = -this.vy * WALL_BOUNCE;
                    this.y = this.y < top ? top : bottom;
                    playClack(Math.abs(this.vy) / 10);
                }
            }

            // Vertical Wall Bounce
            if (this.x < left || this.x > right) {
                const inCorner = this.y < pocketEntry || this.y > tableHeight - pocketEntry;
                
                if (!inCorner) {
                    this.vx = -this.vx * WALL_BOUNCE;
                    this.x = this.x < left ? left : right;
                    playClack(Math.abs(this.vx) / 10);
                }
            }

            checkPocket(this);
        }
    }

    function initTable() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        tableWidth = canvas.width;
        tableHeight = canvas.height;

        balls = [];
        cueBall = new Ball(tableWidth * 0.25, tableHeight / 2, '#fff', '', 'cue');
        balls.push(cueBall);

        const ballSpecs = [
            {n: 1, c: '#ffcc00', t: 'solid'}, {n: 2, c: '#0044ff', t: 'solid'}, {n: 3, c: '#ee0000', t: 'solid'},
            {n: 4, c: '#660099', t: 'solid'}, {n: 5, c: '#ff8800', t: 'solid'}, {n: 6, c: '#008800', t: 'solid'},
            {n: 7, c: '#990000', t: 'solid'}, {n: 8, c: '#0a0a0a', t: 'solid'}, {n: 9, c: '#ffcc00', t: 'stripe'},
            {n: 10, c: '#0044ff', t: 'stripe'}, {n: 11, c: '#ee0000', t: 'stripe'}, {n: 12, c: '#660099', t: 'stripe'},
            {n: 13, c: '#ff8800', t: 'stripe'}, {n: 14, c: '#008800', t: 'stripe'}, {n: 15, c: '#990000', t: 'stripe'}
        ];

        const rackOrder = [0, 8, 1, 9, 7, 2, 10, 11, 3, 4, 12, 13, 5, 14, 6]; 
        const startX = tableWidth * 0.72;
        const startY = tableHeight * 0.5;
        let count = 0;
        for (let i = 0; i < 5; i++) {
            for (let j = 0; j <= i; j++) {
                const spec = ballSpecs[rackOrder[count++]];
                const bx = startX + i * (BALL_RADIUS * 1.85);
                const by = startY + (j - i/2) * (BALL_RADIUS * 2.1);
                balls.push(new Ball(bx, by, spec.c, spec.n, spec.t));
            }
        }
    }

    function checkPocket(ball) {
        // Enlarge detection for larger balls
        const pocketRadius = TABLE_MARGIN * 1.8;
        const pockets = [
            {x: 0, y: 0}, {x: tableWidth/2, y: 0}, {x: tableWidth, y: 0},
            {x: 0, y: tableHeight}, {x: tableWidth/2, y: tableHeight}, {x: tableWidth, y: tableHeight}
        ];

        pockets.forEach(p => {
            const dist = Math.hypot(ball.x - p.x, ball.y - p.y);
            if (dist < pocketRadius) {
                // Ball starts getting "sucked in" as it gets closer to center
                if (dist < BALL_RADIUS) {
                    ball.inPocket = true;
                    ball.vx = 0; ball.vy = 0;
                    if (ball.isCue) {
                        showMessage("SCRATCH", "Cue ball potted! Returning to spot.");
                        setTimeout(() => { ball.inPocket = false; ball.x = tableWidth * 0.25; ball.y = tableHeight / 2; }, 1200);
                    } else {
                        score += ball.label === 8 ? 500 : 100;
                        scoreEl.innerText = score;
                        playClack(0.2);
                    }
                } else {
                    // Simple gravity effect toward center of pocket
                    ball.vx += (p.x - ball.x) * 0.05;
                    ball.vy += (p.y - ball.y) * 0.05;
                }
            }
        });
    }

    function resolveCollisions() {
        for (let i = 0; i < balls.length; i++) {
            for (let j = i + 1; j < balls.length; j++) {
                const b1 = balls[i]; const b2 = balls[j];
                if (b1.inPocket || b2.inPocket) continue;
                const dx = b2.x - b1.x;
                const dy = b2.y - b1.y;
                const dist = Math.hypot(dx, dy);
                if (dist < BALL_RADIUS * 2) {
                    const angle = Math.atan2(dy, dx);
                    const sin = Math.sin(angle), cos = Math.cos(angle);
                    const overlap = (BALL_RADIUS * 2 - dist) / 2;
                    b1.x -= overlap * cos; b1.y -= overlap * sin;
                    b2.x += overlap * cos; b2.y += overlap * sin;
                    const vx1 = b1.vx * cos + b1.vy * sin;
                    const vy1 = b1.vy * cos - b1.vx * sin;
                    const vx2 = b2.vx * cos + b2.vy * sin;
                    const vy2 = b2.vy * cos - b2.vx * sin;
                    b1.vx = vx2 * cos - vy1 * sin;
                    b1.vy = vy1 * cos + vx2 * sin;
                    b2.vx = vx1 * cos - vy2 * sin;
                    b2.vy = vy2 * cos + vx1 * sin;
                    playClack(Math.abs(vx1 - vx2) / 12);
                }
            }
        }
    }

    function drawTable() {
        ctx.fillStyle = '#1a4d2e';
        ctx.fillRect(0, 0, tableWidth, tableHeight);
        const g = ctx.createRadialGradient(tableWidth/2, tableHeight/2, 50, tableWidth/2, tableHeight/2, tableWidth*0.8);
        g.addColorStop(0, 'rgba(255,255,255,0.06)');
        g.addColorStop(1, 'rgba(0,0,0,0.3)');
        ctx.fillStyle = g;
        ctx.fillRect(0,0, tableWidth, tableHeight);

        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        ctx.strokeRect(TABLE_MARGIN, TABLE_MARGIN, tableWidth - TABLE_MARGIN*2, tableHeight - TABLE_MARGIN*2);

        ctx.fillStyle = '#143b23';
        ctx.fillRect(0, 0, tableWidth, TABLE_MARGIN);
        ctx.fillRect(0, tableHeight - TABLE_MARGIN, tableWidth, TABLE_MARGIN);
        ctx.fillRect(0, 0, TABLE_MARGIN, tableHeight);
        ctx.fillRect(tableWidth - TABLE_MARGIN, 0, TABLE_MARGIN, tableHeight);

        ctx.fillStyle = '#050505';
        const pSize = TABLE_MARGIN * 1.5;
        [[0,0],[tableWidth/2,0],[tableWidth,0],[0,tableHeight],[tableWidth/2,tableHeight],[tableWidth,tableHeight]].forEach(p => {
            ctx.beginPath();
            ctx.arc(p[0], p[1], pSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 3;
            ctx.stroke();
        });
    }

    function drawTrajectory() {
        if (!isDragging || isMoving || cueBall.inPocket) return;
        const dx = dragStart.x - dragCurrent.x;
        const dy = dragStart.y - dragCurrent.y;
        const angle = Math.atan2(dy, dx);
        const power = Math.min(Math.hypot(dx, dy) / 8, 28);
        powerFill.style.height = `${(power / 28) * 100}%`;

        let hitDist = 1000;
        let hitBall = null;
        balls.forEach(b => {
            if (b.isCue || b.inPocket) return;
            const bdx = b.x - cueBall.x; const bdy = b.y - cueBall.y;
            const dot = bdx * Math.cos(angle) + bdy * Math.sin(angle);
            if (dot > 0) {
                const perpDist = Math.abs(bdx * -Math.sin(angle) + bdy * Math.cos(angle));
                if (perpDist < BALL_RADIUS * 2) {
                    const d = dot - Math.sqrt(Math.pow(BALL_RADIUS * 2, 2) - Math.pow(perpDist, 2));
                    if (d < hitDist) { hitDist = d; hitBall = b; }
                }
            }
        });

        const endX = cueBall.x + Math.cos(angle) * hitDist;
        const endY = cueBall.y + Math.sin(angle) * hitDist;

        ctx.setLineDash([6, 6]);
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.beginPath();
        ctx.moveTo(cueBall.x, cueBall.y);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.beginPath();
        ctx.arc(endX, endY, BALL_RADIUS, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
        ctx.stroke();

        if (hitBall) {
            const hitAngle = Math.atan2(hitBall.y - endY, hitBall.x - endX);
            ctx.strokeStyle = 'rgba(255,255,0,0.5)';
            ctx.beginPath();
            ctx.moveTo(hitBall.x, hitBall.y);
            ctx.lineTo(hitBall.x + Math.cos(hitAngle) * 80, hitBall.y + Math.sin(hitAngle) * 80);
            ctx.stroke();
        }

        const cueLen = 320;
        const pull = Math.min(Math.hypot(dx, dy), 140);
        ctx.save();
        ctx.translate(cueBall.x - Math.cos(angle)*(BALL_RADIUS+pull+10), cueBall.y - Math.sin(angle)*(BALL_RADIUS+pull+10));
        ctx.rotate(angle);
        const cg = ctx.createLinearGradient(0, 0, -cueLen, 0);
        cg.addColorStop(0, '#fefefe'); cg.addColorStop(0.05, '#d4c0a1'); cg.addColorStop(1, '#2b1d0e');
        ctx.fillStyle = cg;
        ctx.beginPath();
        ctx.moveTo(0,-4); ctx.lineTo(-cueLen, -7); ctx.lineTo(-cueLen, 7); ctx.lineTo(0, 4);
        ctx.fill();
        ctx.restore();
    }

    function gameLoop() {
        isMoving = false;
        balls.forEach(b => {
            b.update();
            if (b.vx !== 0 || b.vy !== 0) isMoving = true;
        });
        resolveCollisions();
        
        ctx.clearRect(0, 0, tableWidth, tableHeight);
        drawTable();
        drawTrajectory();
        balls.forEach(b => b.draw());
        
        statusEl.innerText = isMoving ? "Rolling..." : "Your Shot";
        if (!isDragging) powerFill.style.height = '0%';
        requestAnimationFrame(gameLoop);
    }

    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return {
            x: (t.clientX - rect.left) * (canvas.width / rect.width),
            y: (t.clientY - rect.top) * (canvas.height / rect.height)
        };
    };

    const down = (e) => { if (!isMoving) { isDragging = true; dragStart = getPos(e); dragCurrent = dragStart; } };
    const move = (e) => { if (isDragging) dragCurrent = getPos(e); };
    const up = () => {
        if (!isDragging) return;
        isDragging = false;
        const dx = dragStart.x - dragCurrent.x;
        const dy = dragStart.y - dragCurrent.y;
        const dist = Math.hypot(dx, dy);
        const power = Math.min(dist / 8, 28);
        if (power > 1.5) {
            const angle = Math.atan2(dy, dx);
            cueBall.vx = Math.cos(angle) * power;
            cueBall.vy = Math.sin(angle) * power;
            cueBall.spinX = english.x * power * 0.45;
            cueBall.spinY = english.y * power * 0.45;
            playClack(power / 10);
        }
    };

    spinPad.addEventListener('pointerdown', (e) => {
        const rect = spinPad.getBoundingClientRect();
        const updateSpin = (ev) => {
            const x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
            const y = ((ev.clientY - rect.top) / rect.height) * 2 - 1;
            english = { x: Math.max(-1, Math.min(1, x)), y: Math.max(-1, Math.min(1, y)) };
            spinDot.style.left = `${(english.x + 1) * 50}%`;
            spinDot.style.top = `${(english.y + 1) * 50}%`;
        };
        updateSpin(e);
        const mm = (ev) => updateSpin(ev);
        const mu = () => { window.removeEventListener('pointermove', mm); window.removeEventListener('pointerup', mu); };
        window.addEventListener('pointermove', mm);
        window.addEventListener('pointerup', mu);
    });

    canvas.addEventListener('pointerdown', down);
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);

    function showMessage(t, b) {
        document.getElementById('msg-title').innerText = t;
        document.getElementById('msg-body').innerText = b;
        document.getElementById('message-box').style.display = 'block';
    }
    function hideMessage() { document.getElementById('message-box').style.display = 'none'; }

    window.onload = () => { initTable(); gameLoop(); };
    window.onresize = initTable;
</script>
</body>
</html>
