<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Formation Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Custom scrollbar for control panel */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    </style>
</head>
<body>

    <!-- Canvas for rendering -->
    <canvas id="simCanvas"></canvas>

    <!-- UI Overlay -->
    <div class="absolute top-4 left-4 glass-panel p-4 rounded-xl shadow-2xl w-80 max-h-[90vh] overflow-y-auto z-10 pointer-events-auto">
        <h1 class="text-xl font-bold mb-1 text-white">Stellar Genesis</h1>
        <p class="text-xs text-gray-400 mb-4">N-Body Accretion Simulation</p>

        <div class="space-y-4">
            <!-- Stats -->
            <div class="grid grid-cols-2 gap-2 text-sm bg-black/30 p-3 rounded-lg border border-white/5">
                <div>Bodies: <span id="statBodies" class="font-mono text-blue-400">0</span></div>
                <div>Years: <span id="statTime" class="font-mono text-green-400">0</span></div>
                <div class="col-span-2">Largest Mass: <span id="statMass" class="font-mono text-yellow-400">0</span> M⊕</div>
            </div>

            <!-- Controls -->
            <div class="space-y-3">
                <div>
                    <label class="text-xs text-gray-400 flex justify-between">
                        <span>Simulation Speed (dt)</span>
                        <span id="dtVal">0.1</span>
                    </label>
                    <input type="range" id="dtSlider" min="0.01" max="0.5" step="0.01" value="0.1" class="w-full accent-blue-500">
                </div>
                
                <div>
                    <label class="text-xs text-gray-400 flex justify-between">
                        <span>Gravity Constant (G)</span>
                        <span id="gVal">0.8</span>
                    </label>
                    <input type="range" id="gSlider" min="0.1" max="2.0" step="0.1" value="0.8" class="w-full accent-blue-500">
                </div>

                <div>
                    <label class="text-xs text-gray-400 flex justify-between">
                        <span>Initial Spin</span>
                        <span id="spinVal">0.92</span>
                    </label>
                    <input type="range" id="spinSlider" min="0.5" max="2.0" step="0.01" value="0.92" class="w-full accent-blue-500">
                </div>

                <div>
                    <label class="text-xs text-gray-400 flex justify-between">
                        <span>Gas Friction</span>
                        <span id="fricVal">0.995</span>
                    </label>
                    <input type="range" id="fricSlider" min="0.990" max="1.000" step="0.001" value="0.995" class="w-full accent-blue-500">
                    <p class="text-[10px] text-gray-500 mt-1">Causes matter to fall inwards and clump</p>
                </div>
            </div>

            <hr class="border-white/10">

            <!-- Actions -->
            <div class="grid grid-cols-2 gap-2">
                <button id="btnPause" class="bg-blue-600 hover:bg-blue-500 text-white text-sm py-2 rounded transition">Pause</button>
                <button id="btnReset" class="bg-red-600 hover:bg-red-500 text-white text-sm py-2 rounded transition">Restart Cloud</button>
            </div>
            <button id="btnSpawnDisk" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white text-sm py-2 rounded transition">Inject Gas Cloud</button>

            <!-- Legend -->
            <div class="mt-4 pt-4 border-t border-white/10">
                <h3 class="text-xs font-semibold text-gray-300 mb-2">Evolution Stages</h3>
                <ul class="text-xs space-y-2">
                    <li class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-blue-300 opacity-50 shadow-[0_0_5px_rgba(147,197,253,0.5)]"></span> Nebula Gas / Dust</li>
                    <li class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-gray-400"></span> Asteroids / Protoplanets</li>
                    <li class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-orange-400"></span> Gas Giants</li>
                    <li class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-yellow-100 shadow-[0_0_10px_rgba(255,255,200,1)]"></span> Ignited Star</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        /**
         * Physical constants and simulation parameters
         */
        const Config = {
            G: 0.8,                  // Increased gravity for more active accretion
            SOFTENING: 15,           // Tuned softening to absorb chaotic slingshot forces safely
            DT: 0.1,                 // Time step per frame
            FRICTION: 0.995,         // Drag to help gas spiral in
            SPIN_MULTIPLIER: 0.92,   // Spin determines outer disk expansion
            
            // Mass thresholds for visual categorization
            MASS_ASTEROID: 4,
            MASS_PLANET: 10,         // Planets completely decouple from gas friction to orbit forever
            MASS_GAS_GIANT: 60,
            MASS_STAR: 900,          // Star must consume > 60% of total mass before ignition to prevent planets wandering off

            // Initial cloud generation
            INITIAL_PARTICLES: 1200, // Higher resolution for smoother accretion
            CLOUD_RADIUS: Math.min(window.innerWidth, window.innerHeight) * 0.45,
            BASE_MASS: 1.2,          // Total cloud mass is ~1440
            CENTER_MASS_SEED: 0      // Set to 0: completely organic star formation
        };

        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // Optimize
        let width, height;

        let bodies = [];
        let shockwaves = []; // To store stellar ignition animations
        let cameraShake = 0; // Intensity of screen shake
        let cameraX = 0, cameraY = 0; // Dynamic camera tracking
        let cameraScale = 1.0; // Dynamic camera zoom
        let simulationTime = 0;
        let isPaused = false;
        let animationFrameId;

        // UI Elements
        const uiBodies = document.getElementById('statBodies');
        const uiTime = document.getElementById('statTime');
        const uiMass = document.getElementById('statMass');
        const uiDt = document.getElementById('dtSlider');
        const uiG = document.getElementById('gSlider');
        const uiSpin = document.getElementById('spinSlider');
        const uiFric = document.getElementById('fricSlider');

        class Body {
            constructor(x, y, vx, vy, mass) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.mass = mass;
                this.updateProperties();
                this.dead = false; // Flag for deletion after merge
            }

            // Recalculate radius and visual properties based on mass
            updateProperties() {
                let density = 1.0;
                if (this.mass >= Config.MASS_PLANET) density = 1.5;
                if (this.mass >= Config.MASS_GAS_GIANT) density = 0.8; 
                if (this.mass >= Config.MASS_STAR) density = 2.0;      
                
                // Physical radii kept tight so they must gravitationally capture each other
                this.radius = Math.max(1.5, Math.pow((this.mass / density) * 10, 1/3));

                const oldType = this.type;
                
                if (this.mass >= Config.MASS_STAR) {
                    this.type = 'star';
                    this.color = '#FFFACD'; // LemonChiffon
                    this.glowColor = 'rgba(255, 230, 150, 0.8)';
                    
                    // Trigger the ignition animation once
                    if (oldType && oldType !== 'star') {
                        this.ignite();
                    }
                } else if (this.mass >= Config.MASS_GAS_GIANT) {
                    this.type = 'gas_giant';
                    this.color = '#FDBA74'; 
                    this.glowColor = 'rgba(253, 186, 116, 0.4)';
                } else if (this.mass >= Config.MASS_PLANET) {
                    this.type = 'planet';
                    const hue = Math.floor(Math.abs(this.x + this.y) % 360);
                    this.color = `hsl(${hue}, 40%, 50%)`;
                    this.glowColor = null;
                } else if (this.mass >= Config.MASS_ASTEROID) {
                    this.type = 'asteroid';
                    this.color = '#9CA3AF'; 
                    this.glowColor = null;
                } else {
                    this.type = 'gas';
                    this.color = '#93C5FD'; 
                    this.glowColor = 'rgba(147, 197, 253, 0.2)';
                }
            }

            ignite() {
                shockwaves.push({
                    x: this.x,
                    y: this.y,
                    radius: this.radius,
                    energy: 1.0, 
                    rays: Array.from({length: 16}, () => ({
                        angle: Math.random() * Math.PI * 2,
                        lengthMultiplier: 0.5 + Math.random() * 1.5,
                        width: Math.random() * 4 + 1
                    })),
                    ejecta: Array.from({length: 80}, () => ({
                        angle: Math.random() * Math.PI * 2,
                        speed: 800 + Math.random() * 1500, 
                        dist: this.radius,
                        size: Math.random() * 3 + 1,
                        life: 1.0
                    }))
                });
                cameraShake = 25;
            }

            merge(other) {
                const totalMass = this.mass + other.mass;
                this.vx = (this.vx * this.mass + other.vx * other.mass) / totalMass;
                this.vy = (this.vy * this.mass + other.vy * other.mass) / totalMass;
                this.x = (this.x * this.mass + other.x * other.mass) / totalMass;
                this.y = (this.y * this.mass + other.y * other.mass) / totalMass;
                
                this.mass = totalMass;
                this.updateProperties();
                other.dead = true;
            }

            draw(ctx, viewLeft, viewRight, viewTop, viewBottom) {
                if (!isFinite(this.x) || !isFinite(this.y) || 
                    this.x < viewLeft || this.x > viewRight || 
                    this.y < viewTop || this.y > viewBottom) return;

                ctx.beginPath();
                
                if (this.glowColor) {
                    const glowRadius = Math.max(0.1, this.type === 'star' ? this.radius * 4 : 
                                     this.type === 'gas_giant' ? this.radius * 2 : 
                                     this.radius * 3); 
                    
                    const grad = ctx.createRadialGradient(this.x, this.y, this.radius * 0.5, this.x, this.y, glowRadius);
                    grad.addColorStop(0, this.glowColor);
                    grad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = grad;
                    ctx.arc(this.x, this.y, glowRadius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                }

                ctx.fillStyle = this.color;
                ctx.arc(this.x, this.y, Math.max(0.1, this.radius), 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function initSimulation() {
            bodies = [];
            shockwaves = [];
            simulationTime = 0;
            cameraX = 0;
            cameraY = 0;
            cameraScale = 1.0;
            
            const cx = 0; 
            const cy = 0;
            const totalCloudMass = Config.INITIAL_PARTICLES * Config.BASE_MASS;

            let sysVx = 0, sysVy = 0, sysMass = 0;

            for (let i = 0; i < Config.INITIAL_PARTICLES; i++) {
                // Continuous density gradient ensuring heavy core formation naturally
                const densityPower = 0.85;
                const r = Config.CLOUD_RADIUS * Math.pow(Math.random(), densityPower);
                const theta = Math.random() * Math.PI * 2;
                
                const x = cx + r * Math.cos(theta);
                const y = cy + r * Math.sin(theta);

                // Math matched precisely to density gradient to establish stable initial orbits
                const radiusRatio = r / Config.CLOUD_RADIUS;
                const enclosedMass = totalCloudMass * Math.pow(radiusRatio, 1.0 / densityPower);
                const orbitalVelocityMag = Math.sqrt((Config.G * enclosedMass) / Math.max(1, r)) * Config.SPIN_MULTIPLIER;
                
                let vx = -Math.sin(theta) * orbitalVelocityMag + (Math.random() - 0.5) * orbitalVelocityMag * 0.10;
                let vy = Math.cos(theta) * orbitalVelocityMag + (Math.random() - 0.5) * orbitalVelocityMag * 0.10;

                const mass = Config.BASE_MASS * (0.5 + Math.random());
                bodies.push(new Body(x, y, vx, vy, mass));
                
                sysVx += vx * mass;
                sysVy += vy * mass;
                sysMass += mass;
            }

            // Zero out system momentum so the system doesn't drift
            sysVx /= sysMass;
            sysVy /= sysMass;
            for (let b of bodies) {
                b.vx -= sysVx;
                b.vy -= sysVy;
            }
        }

        function injectGasCloud() {
            let heaviest = bodies[0];
            for (let b of bodies) {
                if (!b.dead && b.mass > (heaviest ? heaviest.mass : 0)) heaviest = b;
            }
            let sysM = 0, sysX = 0, sysY = 0;
            if (heaviest) {
                for (let b of bodies) {
                    if (b.dead) continue;
                    let dx = b.x - heaviest.x;
                    let dy = b.y - heaviest.y;
                    if (dx*dx + dy*dy < Config.CLOUD_RADIUS * Config.CLOUD_RADIUS * 10) {
                        sysM += b.mass;
                        sysX += b.x * b.mass;
                        sysY += b.y * b.mass;
                    }
                }
                if (sysM > 0) { sysX /= sysM; sysY /= sysM; }
            }

            const injectCount = 200;
            const outerRadius = Config.CLOUD_RADIUS * 1.5;
            
            for (let i = 0; i < injectCount; i++) {
                const r = outerRadius * (0.8 + Math.random() * 0.4);
                const theta = Math.random() * Math.PI * 2;
                const x = sysX + r * Math.cos(theta);
                const y = sysY + r * Math.sin(theta);

                const velMag = Math.sqrt((Config.G * sysM) / Math.max(1, r)) * 0.9 * Config.SPIN_MULTIPLIER; 
                let vx = -Math.sin(theta) * velMag + (Math.random() - 0.5);
                let vy = Math.cos(theta) * velMag + (Math.random() - 0.5);

                bodies.push(new Body(x, y, vx, vy, Config.BASE_MASS * 0.5));
            }
        }

        function updatePhysics() {
            if (isPaused) return;

            const n = bodies.length;
            
            let heaviest = null;
            let maxBodyMass = 0;
            let sysMass = 0;
            let cmX = 0, cmY = 0;
            
            for (let b of bodies) {
                if (b.dead) continue;
                if (b.mass > maxBodyMass) {
                    maxBodyMass = b.mass;
                    heaviest = b;
                }
            }

            if (heaviest) {
                for (let b of bodies) {
                    if (b.dead) continue;
                    let dx = b.x - heaviest.x;
                    let dy = b.y - heaviest.y;
                    if (dx*dx + dy*dy < Math.pow(Config.CLOUD_RADIUS * 10, 2)) {
                        cmX += b.x * b.mass;
                        cmY += b.y * b.mass;
                        sysMass += b.mass;
                    }
                }
                if (sysMass > 0) { cmX /= sysMass; cmY /= sysMass; }
            }

            const dragLoss = 1.0 - Config.FRICTION;
            const dragStrength = dragLoss * 20.0 * Config.DT;

            for (let i = 0; i < n; i++) {
                const b1 = bodies[i];
                if (b1.dead) continue;

                // --- PERFECT DECOUPLING ---
                // Planets (mass >= MASS_PLANET) are strictly N-Body purely driven by gravity.
                // Gas & Dust feel friction, spiraling into the star.
                if (b1.mass < Config.MASS_PLANET && dragStrength > 0) {
                    const rx = b1.x - cmX;
                    const ry = b1.y - cmY;
                    const rSq = rx*rx + ry*ry;
                    
                    if (rSq > 10) {
                        const r = Math.sqrt(rSq);
                        const lz = rx * b1.vy - ry * b1.vx;
                        const dir = lz >= 0 ? 1 : -1;
                        
                        const tx = (-ry / r) * dir;
                        const ty = (rx / r) * dir;
                        
                        const radiusRatio = Math.min(1.0, r / Config.CLOUD_RADIUS);
                        const enclosedMass = maxBodyMass + (sysMass - maxBodyMass) * Math.pow(radiusRatio, 1.2);
                        const massRatio = Math.min(1.0, Config.BASE_MASS / b1.mass);
                        
                        // Gas wants to fall inwards (sub-orbital speed).
                        const orbitSpeedMult = 1.0 - (0.15 * massRatio);
                        const vIdealMag = Math.sqrt((Config.G * enclosedMass) / (r + 10)) * orbitSpeedMult;
                        
                        const effectiveDrag = dragStrength * massRatio;
                        
                        b1.vx += ((tx * vIdealMag) - b1.vx) * effectiveDrag;
                        b1.vy += ((ty * vIdealMag) - b1.vy) * effectiveDrag;
                    }
                }

                // --- Symplectic N-Body Gravity ---
                for (let j = i + 1; j < n; j++) {
                    const b2 = bodies[j];
                    if (b2.dead) continue;

                    const dx = b2.x - b1.x;
                    const dy = b2.y - b1.y;
                    const distSq = dx*dx + dy*dy;
                    const dist = Math.max(0.1, Math.sqrt(distSq));

                    if (dist < b1.radius + b2.radius) {
                        if (b1.mass > b2.mass) {
                            b1.merge(b2);
                            continue; 
                        } else {
                            b2.merge(b1);
                            break; 
                        }
                    }

                    const force = (Config.G * b1.mass * b2.mass) / (distSq + Config.SOFTENING);
                    const fx = (force * dx) / dist;
                    const fy = (force * dy) / dist;

                    b1.vx += (fx / b1.mass) * Config.DT;
                    b1.vy += (fy / b1.mass) * Config.DT;
                    b2.vx -= (fx / b2.mass) * Config.DT;
                    b2.vy -= (fy / b2.mass) * Config.DT; 
                }
            }

            let maxMass = 0;
            for (let i = bodies.length - 1; i >= 0; i--) {
                const b = bodies[i];
                if (b.dead) {
                    bodies.splice(i, 1);
                } else {
                    const distFromCenterSq = (b.x - cmX)*(b.x - cmX) + (b.y - cmY)*(b.y - cmY);
                    if (distFromCenterSq > Math.pow(Config.CLOUD_RADIUS * 20, 2)) {
                        bodies.splice(i, 1);
                        continue;
                    }

                    if (!isFinite(b.vx)) b.vx = 0;
                    if (!isFinite(b.vy)) b.vy = 0;

                    if (b.vx > 20000) b.vx = 20000;
                    if (b.vx < -20000) b.vx = -20000;
                    if (b.vy > 20000) b.vy = 20000;
                    if (b.vy < -20000) b.vy = -20000;

                    b.x += b.vx * Config.DT;
                    b.y += b.vy * Config.DT;
                    
                    if (!isFinite(b.x)) b.x = 0;
                    if (!isFinite(b.y)) b.y = 0;

                    if (b.mass > maxMass) maxMass = b.mass;
                }
            }

            for (let i = shockwaves.length - 1; i >= 0; i--) {
                let sw = shockwaves[i];
                const expansionSpeed = 1500; 
                
                sw.radius += expansionSpeed * Config.DT;
                sw.energy -= 0.3 * Config.DT; 

                for (let p of sw.ejecta) {
                    p.dist += p.speed * Config.DT;
                    p.life -= 0.4 * Config.DT;
                }

                if (sw.energy > 0) {
                    for (let b of bodies) {
                        if (b.dead || b.mass >= Config.MASS_ASTEROID) continue;
                        
                        const dx = b.x - sw.x;
                        const dy = b.y - sw.y;
                        const distSq = dx*dx + dy*dy;
                        const dist = Math.max(0.1, Math.sqrt(distSq)); 

                        if (Math.abs(dist - sw.radius) < expansionSpeed * Config.DT * 2.0 || dist < sw.radius) {
                            const force = (sw.energy * 1200); 
                            b.vx += (dx / dist) * force;
                            b.vy += (dy / dist) * force;
                        }
                    }
                } else {
                    shockwaves.splice(i, 1); 
                }
            }
            
            if (cameraShake > 0) {
                cameraShake -= 15 * Config.DT;
                if (cameraShake < 0) cameraShake = 0;
            }

            simulationTime += Config.DT;
            updateUIStats(maxMass);
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            let heaviest = null;
            let maxM = 0;
            let maxDistSq = Config.CLOUD_RADIUS * Config.CLOUD_RADIUS * 0.25; 

            for (let b of bodies) {
                if (!b.dead && b.mass > maxM) {
                    maxM = b.mass;
                    heaviest = b;
                }
            }

            if (heaviest) {
                cameraX += (heaviest.x - cameraX) * 0.002;
                cameraY += (heaviest.y - cameraY) * 0.002;
            }

            for (let b of bodies) {
                if (b.dead) continue;
                let dx = b.x - cameraX;
                let dy = b.y - cameraY;
                let distSq = dx*dx + dy*dy;
                
                if (b.mass >= Config.MASS_ASTEROID && distSq > maxDistSq && distSq < Math.pow(Config.CLOUD_RADIUS * 15, 2)) {
                    maxDistSq = distSq;
                }
            }

            let maxDist = Math.sqrt(maxDistSq);
            let minScreenDim = Math.min(width, height);
            let targetScale = (minScreenDim * 0.40) / maxDist;
            
            if (targetScale < 0.05) targetScale = 0.05; 
            if (targetScale > 2.0) targetScale = 2.0; 
            
            cameraScale += (targetScale - cameraScale) * 0.005; 

            ctx.save();
            ctx.translate(width / 2, height / 2); 

            if (cameraShake > 0) {
                ctx.translate((Math.random() - 0.5) * cameraShake * 2, (Math.random() - 0.5) * cameraShake * 2);
            }

            ctx.scale(cameraScale, cameraScale); 
            ctx.translate(-cameraX, -cameraY); 

            const viewMargin = 100 / cameraScale;
            const viewLeft = cameraX - (width / 2) / cameraScale - viewMargin;
            const viewRight = cameraX + (width / 2) / cameraScale + viewMargin;
            const viewTop = cameraY - (height / 2) / cameraScale - viewMargin;
            const viewBottom = cameraY + (height / 2) / cameraScale + viewMargin;

            for (let b of bodies) {
                b.draw(ctx, viewLeft, viewRight, viewTop, viewBottom);
            }

            for (let sw of shockwaves) {
                if (sw.energy <= 0) continue;
                if (!isFinite(sw.x) || !isFinite(sw.y)) continue;

                ctx.save();
                ctx.globalCompositeOperation = "screen";

                for (let ray of sw.rays) {
                    const rayLen = Math.max(0.1, sw.radius * ray.lengthMultiplier * 1.5);
                    const rayGrad = ctx.createLinearGradient(
                        sw.x, sw.y, 
                        sw.x + Math.cos(ray.angle) * rayLen, 
                        sw.y + Math.sin(ray.angle) * rayLen
                    );
                    rayGrad.addColorStop(0, `rgba(255, 255, 255, ${sw.energy * 0.8})`);
                    rayGrad.addColorStop(1, 'rgba(255, 230, 150, 0)');
                    
                    ctx.beginPath();
                    ctx.moveTo(sw.x, sw.y);
                    ctx.lineTo(sw.x + Math.cos(ray.angle) * rayLen, sw.y + Math.sin(ray.angle) * rayLen);
                    ctx.strokeStyle = rayGrad;
                    ctx.lineWidth = Math.max(1 / cameraScale, ray.width * sw.energy); 
                    ctx.stroke();
                }

                for (let p of sw.ejecta) {
                    if (p.life <= 0) continue;
                    const px = sw.x + Math.cos(p.angle) * p.dist;
                    const py = sw.y + Math.sin(p.angle) * p.dist;
                    
                    ctx.beginPath();
                    ctx.arc(px, py, Math.max(0.1, p.size * p.life), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, ${Math.floor(200 * p.life)}, ${Math.floor(100 * p.life)}, ${p.life})`;
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.moveTo(px, py);
                    ctx.lineTo(px - Math.cos(p.angle) * p.dist * 0.1, py - Math.sin(p.angle) * p.dist * 0.1);
                    ctx.strokeStyle = `rgba(255, 150, 50, ${p.life * 0.5})`;
                    ctx.lineWidth = Math.max(0.1 / cameraScale, p.size);
                    ctx.stroke();
                }

                ctx.beginPath();
                ctx.arc(sw.x, sw.y, Math.max(0.1, sw.radius), 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(200, 230, 255, ${sw.energy * 0.8})`;
                ctx.lineWidth = Math.max(1 / cameraScale, sw.energy * 8);
                ctx.stroke();

                if (sw.radius > 50) {
                    ctx.beginPath();
                    ctx.arc(sw.x, sw.y, Math.max(0.1, sw.radius * 0.85), 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255, 200, 100, ${sw.energy * 0.5})`;
                    ctx.lineWidth = Math.max(1 / cameraScale, sw.energy * 4);
                    ctx.stroke();
                }

                const bloomRadius = Math.max(0.1, sw.radius * 0.6);
                const grad = ctx.createRadialGradient(sw.x, sw.y, 0, sw.x, sw.y, bloomRadius);
                grad.addColorStop(0, `rgba(255, 255, 255, ${sw.energy})`);
                grad.addColorStop(0.2, `rgba(255, 250, 200, ${sw.energy * 0.8})`);
                grad.addColorStop(1, 'rgba(255, 200, 100, 0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(sw.x, sw.y, bloomRadius, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            ctx.restore(); 
        }

        function loop() {
            try {
                updatePhysics();
                draw();
            } catch (e) {
                console.error("Simulation Error Caught:", e);
            }
            animationFrameId = requestAnimationFrame(loop);
        }

        function updateUIStats(maxMass) {
            if (Math.floor(simulationTime) % 5 === 0) {
                uiBodies.innerText = bodies.length;
                uiTime.innerText = Math.floor(simulationTime * 100).toLocaleString(); 
                uiMass.innerText = Math.floor(maxMass);
            }
        }

        document.getElementById('btnPause').addEventListener('click', (e) => {
            isPaused = !isPaused;
            e.target.innerText = isPaused ? "Resume" : "Pause";
            e.target.classList.toggle('bg-blue-600');
            e.target.classList.toggle('bg-yellow-600');
        });

        document.getElementById('btnReset').addEventListener('click', () => {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, width, height);
            initSimulation();
        });

        document.getElementById('btnSpawnDisk').addEventListener('click', () => {
            injectGasCloud();
        });

        uiDt.addEventListener('input', (e) => {
            Config.DT = parseFloat(e.target.value);
            document.getElementById('dtVal').innerText = Config.DT.toFixed(2);
        });

        uiG.addEventListener('input', (e) => {
            Config.G = parseFloat(e.target.value);
            document.getElementById('gVal').innerText = Config.G.toFixed(1);
        });

        uiSpin.addEventListener('input', (e) => {
            Config.SPIN_MULTIPLIER = parseFloat(e.target.value);
            document.getElementById('spinVal').innerText = Config.SPIN_MULTIPLIER.toFixed(2);
        });

        uiFric.addEventListener('input', (e) => {
            Config.FRICTION = parseFloat(e.target.value);
            document.getElementById('fricVal').innerText = Config.FRICTION.toFixed(3);
        });

        canvas.addEventListener('mousedown', (e) => {
            const worldX = (e.clientX - width / 2) / cameraScale + cameraX;
            const worldY = (e.clientY - height / 2) / cameraScale + cameraY;

            const rogue = new Body(worldX, worldY, 0, 0, Config.MASS_PLANET * 2);
            bodies.push(rogue);
        });

        window.addEventListener('resize', () => {
            resize();
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, width, height);
        });

        resize();
        initSimulation();
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, width, height);
        loop();

    </script>
</body>
</html>
