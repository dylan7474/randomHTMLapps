<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxScribe - Premium Speech to Text</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B0F19; /* Deep luxury dark */
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.1) 0, transparent 50%);
            color: #E2E8F0;
        }

        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .premium-btn {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
        }
        
        .premium-btn:hover {
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.5);
            transform: translateY(-1px);
        }

        .stop-btn {
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #editorContainer::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 20px;
            background: linear-gradient(to bottom, rgba(17, 24, 39, 0.9), transparent);
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen text-slate-300">

    <div class="max-w-5xl mx-auto px-4 py-8 md:py-12">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-bold text-white flex items-center gap-3 tracking-tight">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                        <i class="fa-solid fa-microphone-lines text-white text-xl"></i>
                    </div>
                    VoxScribe <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 text-2xl">Pro</span>
                </h1>
                <p class="text-slate-400 mt-2 text-sm font-medium tracking-wide">Studio-grade speech recognition</p>
            </div>
            
            <div class="flex items-center gap-4">
                <select id="languageSelect" class="bg-slate-800/80 border border-slate-700 text-white rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all cursor-pointer">
                    <option value="en-US">English (US)</option>
                    <option value="en-GB" selected>English (UK)</option>
                    <option value="es-ES">Spanish (Spain)</option>
                    <option value="fr-FR">French (France)</option>
                    <option value="de-DE">German</option>
                    <option value="zh-CN">Chinese (Mandarin)</option>
                    <option value="ja-JP">Japanese</option>
                </select>
                <div id="statusIndicator" class="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-slate-800/80 border border-slate-700 text-xs font-bold text-slate-400 uppercase tracking-widest transition-all shadow-inner">
                    <span class="w-2 h-2 rounded-full bg-slate-500 shadow-[0_0_8px_rgba(100,116,139,0.5)]" id="statusDot"></span>
                    <span id="statusText">Standby</span>
                </div>
            </div>
        </header>

        <!-- Main Editor Area -->
        <main class="glass-panel rounded-2xl overflow-hidden relative">
            <!-- Toolbar -->
            <div class="border-b border-white/5 p-4 md:px-6 bg-slate-900/40 flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center gap-4">
                    <button id="startBtn" class="premium-btn flex items-center gap-2 text-white px-6 py-2.5 rounded-xl font-semibold transition-all active:scale-95">
                        <i class="fa-solid fa-play text-sm"></i> Start Recording
                    </button>
                    <button id="stopBtn" class="stop-btn hidden flex items-center gap-2 text-white px-6 py-2.5 rounded-xl font-semibold transition-all active:scale-95">
                        <i class="fa-solid fa-stop text-sm"></i> Stop
                    </button>
                    
                    <!-- Vox Meter (Visualizer) -->
                    <div class="h-8 w-32 flex items-center justify-center opacity-0 transition-opacity duration-500" id="visualizerContainer">
                        <canvas id="voxMeter" width="120" height="24"></canvas>
                    </div>
                </div>

                <div class="flex items-center gap-3 bg-slate-800/50 p-2 rounded-xl border border-white/5">
                    <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider hidden sm:block">AI Backend:</span>
                    <select id="aiModelSelect" class="bg-slate-900 border border-slate-700 text-white rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all cursor-pointer min-w-[150px]">
                        <option value="gemini">Gemini 2.5 (Cloud)</option>
                        <optgroup label="Local Ollama" id="ollamaGroup">
                            <option value="" disabled>Searching local...</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <!-- Content -->
            <div id="editorContainer" class="relative">
                <div id="transcriptArea" class="min-h-[450px] max-h-[650px] overflow-y-auto p-6 md:p-10 text-lg md:text-xl leading-relaxed text-slate-200 custom-scrollbar flex flex-col gap-4 focus:outline-none" contenteditable="false">
                    <div class="text-center w-full mt-10"><span class="text-slate-600 italic font-light">Awaiting your voice... Start recording to chat with AI.</span></div>
                </div>
                
                <!-- Feedback Toast -->
                <div id="toast" class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-6 py-3 rounded-full text-sm font-bold shadow-lg shadow-indigo-600/30 opacity-0 transition-all transform translate-y-4 pointer-events-none flex items-center gap-2">
                    <i class="fa-solid fa-circle-check"></i> <span id="toastMsg">Action successful!</span>
                </div>
            </div>
        </main>
    </div>

    <!-- No Support Modal -->
    <div id="errorModal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-8 max-w-md w-full shadow-2xl">
            <div class="w-16 h-16 bg-red-500/10 border border-red-500/20 text-red-500 rounded-2xl flex items-center justify-center text-2xl mb-6 shadow-[0_0_15px_rgba(239,68,68,0.2)]">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">Browser Not Supported</h3>
            <p class="text-slate-400 mb-6 text-sm leading-relaxed" id="errorMessage">Sorry, your browser doesn't support the Web Speech API. Please try using Google Chrome or Microsoft Edge.</p>
            <button onclick="document.getElementById('errorModal').classList.add('hidden')" class="w-full bg-slate-100 text-slate-900 py-3 rounded-xl font-bold hover:bg-white transition-colors">Understood</button>
        </div>
    </div>

    <script>
        // Check for browser support
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        // State management
        let isRecording = false;
        let finalTranscript = '';
        let recognition = null;
        let chatHistory = [];
        let isAITalking = false;
        
        // TTS Streaming state
        window.speechUtterances = []; // Prevents Chrome's garbage collection bug
        let streamComplete = false;
        let chunksSpeaking = 0;

        // Web Audio API logic (Vox Meter)
        let audioContext;
        let analyser;
        let microphone;
        let animationId;
        const canvas = document.getElementById('voxMeter');
        const canvasCtx = canvas.getContext('2d');
        const visualizerContainer = document.getElementById('visualizerContainer');

        // DOM Elements
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const languageSelect = document.getElementById('languageSelect');
        const aiModelSelect = document.getElementById('aiModelSelect');
        const ollamaGroup = document.getElementById('ollamaGroup');
        const transcriptArea = document.getElementById('transcriptArea');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');
        const errorModal = document.getElementById('errorModal');
        const errorMessage = document.getElementById('errorMessage');

        // Initialize TTS & API Keys
        const synth = window.speechSynthesis;
        const apiKey = ""; // Injected by Canvas environment for Gemini

        // Fetch Ollama Models
        async function fetchOllamaModels() {
            try {
                // Add an abort controller so it doesn't hang if Ollama is offline
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);

                const response = await fetch('http://127.0.0.1:11434/api/tags', { signal: controller.signal });
                clearTimeout(timeoutId);

                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                ollamaGroup.innerHTML = '';
                if (data.models.length === 0) {
                    ollamaGroup.innerHTML = '<option value="" disabled>No models found</option>';
                    return;
                }
                
                data.models.forEach(model => {
                    const option = document.createElement('option');
                    option.value = 'ollama:' + model.name;
                    option.textContent = model.name;
                    ollamaGroup.appendChild(option);
                });
            } catch (error) {
                console.warn('Ollama not reachable (Offline, HTTPS context, or CORS blocked).');
                ollamaGroup.innerHTML = '<option value="" disabled>Local Ollama unavailable</option>';
                // Removed the showError modal here so it doesn't block the app on load
            }
        }

        fetchOllamaModels();

        if (!SpeechRecognition) {
            showError("Your browser doesn't support the Web Speech API. This feature requires Google Chrome, Microsoft Edge, or Safari.");
        } else {
            initRecognition();
        }

        // Initialize Audio Visualizer
        async function startVisualizer() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                
                microphone.connect(analyser);
                
                analyser.fftSize = 64; 
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                visualizerContainer.classList.remove('opacity-0');

                function draw() {
                    if(!isRecording) return;
                    
                    animationId = requestAnimationFrame(draw);
                    analyser.getByteFrequencyData(dataArray);

                    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    const barWidth = (canvas.width / bufferLength) * 1.5;
                    let x = 0;

                    for(let i = 0; i < bufferLength; i++) {
                        let barHeight = (dataArray[i] / 255) * canvas.height;
                        if(barHeight < 2) barHeight = 2; 
                        
                        const r = 99 + (barHeight * 2);
                        const g = 102;
                        const b = 241 + (barHeight);
                        
                        canvasCtx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                        
                        const y = (canvas.height - barHeight) / 2;
                        
                        canvasCtx.beginPath();
                        canvasCtx.roundRect(x, y, barWidth - 1, barHeight, 2);
                        canvasCtx.fill();
                        
                        x += barWidth;
                    }
                }
                draw();
            } catch (err) {
                console.warn("Could not start visualizer (microphone access):", err);
            }
        }

        function stopVisualizer() {
            if (animationId) cancelAnimationFrame(animationId);
            if (audioContext && audioContext.state !== 'closed') {
                audioContext.close();
            }
            if(microphone) microphone.disconnect();
            visualizerContainer.classList.add('opacity-0');
            setTimeout(() => canvasCtx.clearRect(0, 0, canvas.width, canvas.height), 500);
        }

        function initRecognition() {
            recognition = new SpeechRecognition();
            // Crucial change: Turn OFF continuous mode so the microphone naturally shuts off 
            // when you stop talking, triggering the AI response.
            recognition.continuous = false; 
            recognition.interimResults = true;
            recognition.lang = languageSelect.value;

            recognition.onstart = () => {
                isRecording = true;
                updateUI();
                startVisualizer();
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }

                updateCurrentTranscriptUI(interimTranscript);
            };

            recognition.onerror = (event) => {
                if (event.error === 'no-speech') return; 
                if (event.error === 'aborted') return;

                console.error('Speech recognition error', event.error);
                if (event.error === 'not-allowed') {
                    showError("Microphone access was denied. Please check your browser permissions.");
                    stopRecording();
                } else if (event.error === 'network') {
                    showError("Network error. Speech recognition requires an internet connection.");
                    stopRecording();
                }
            };

            recognition.onend = () => {
                stopVisualizer();
                isRecording = false;
                updateUI();
                
                // When silence is detected, send the captured text
                const userText = finalTranscript.trim();
                finalTranscript = '';
                
                if (userText.length > 0) {
                    handleUserMessage(userText);
                } else if (!document.getElementById('stopBtn').classList.contains('hidden') && !isAITalking) {
                    // If user didn't speak but recording is still "on", restart mic
                    startRecording();
                }
            };
        }

        function updateCurrentTranscriptUI(interim = '') {
            const tempMsg = document.getElementById('temp-msg');
            if (tempMsg) tempMsg.remove();
            
            const placeholder = transcriptArea.querySelector('.italic');
            if (placeholder) placeholder.remove();

            if (finalTranscript || interim) {
                const msgDiv = document.createElement('div');
                msgDiv.id = 'temp-msg';
                msgDiv.className = 'self-end bg-indigo-600/20 border border-indigo-500/30 text-indigo-100 rounded-2xl rounded-tr-sm px-5 py-3 max-w-[85%] shadow-md ml-auto';
                msgDiv.innerHTML = `<span class="text-slate-200">${finalTranscript}</span><span class="text-indigo-400 opacity-70">${interim}</span>`;
                transcriptArea.appendChild(msgDiv);
                transcriptArea.scrollTop = transcriptArea.scrollHeight;
            }
        }

        function appendMessageToChat(role, text) {
            const placeholder = transcriptArea.querySelector('.italic');
            if (placeholder) placeholder.remove();
            
            const tempMsg = document.getElementById('temp-msg');
            if (tempMsg) tempMsg.remove();

            const msgDiv = document.createElement('div');
            if (role === 'user') {
                msgDiv.className = 'self-end bg-indigo-600 text-white rounded-2xl rounded-tr-sm px-5 py-3 max-w-[85%] shadow-lg shadow-indigo-600/20 ml-auto';
            } else {
                msgDiv.className = 'self-start bg-slate-800 border border-slate-700 text-slate-200 rounded-2xl rounded-tl-sm px-5 py-3 max-w-[85%] shadow-lg mr-auto';
            }
            msgDiv.innerText = text;
            transcriptArea.appendChild(msgDiv);
            transcriptArea.scrollTop = transcriptArea.scrollHeight;
            
            chatHistory.push({ role: role, content: text });
        }

        // New Robust TTS Engine 
        function speakSentenceChunk(text) {
            if (!text.trim()) return;

            chunksSpeaking++;
            const utterance = new SpeechSynthesisUtterance(text);
            
            const targetLang = languageSelect.value; 
            utterance.lang = targetLang;
            
            const voices = synth.getVoices();
            const preferredVoice = voices.find(v => v.lang === targetLang || v.lang === targetLang.replace('-', '_')) 
                || voices.find(v => v.lang.startsWith(targetLang.split('-')[0])) 
                || voices[0];
                
            if (preferredVoice) utterance.voice = preferredVoice;
            
            utterance.rate = 1.05; 

            // Save reference to prevent silent audio cut-outs (Chrome GC bug)
            window.speechUtterances.push(utterance);

            utterance.onend = () => {
                chunksSpeaking--;
                // Clean up reference
                const idx = window.speechUtterances.indexOf(utterance);
                if (idx > -1) window.speechUtterances.splice(idx, 1);
                
                checkConversationResume();
            };

            utterance.onerror = (e) => {
                console.warn("TTS skipped/error:", e);
                chunksSpeaking--;
                checkConversationResume();
            };

            synth.speak(utterance);
        }

        function checkConversationResume() {
            // Only restart the mic if text generation is done AND audio is done playing
            if (streamComplete && chunksSpeaking === 0) {
                isAITalking = false;
                statusDot.classList.remove('recording-pulse');
                
                if (!document.getElementById('stopBtn').classList.contains('hidden')) {
                    startRecording(); 
                } else {
                    updateUI();
                }
            }
        }

        async function handleUserMessage(text) {
            appendMessageToChat('user', text);
            
            const selectedModel = aiModelSelect.value;
            if (!selectedModel) {
                showToast("Please select an AI model first.");
                return;
            }

            isAITalking = true;
            streamComplete = false;
            chunksSpeaking = 0;
            window.speechUtterances = []; 

            statusText.innerText = "AI Thinking...";
            statusIndicator.classList.replace('bg-slate-800/80', 'bg-purple-500/10');
            statusIndicator.classList.replace('border-slate-700', 'border-purple-500/20');
            statusIndicator.classList.replace('text-slate-400', 'text-purple-400');
            statusDot.classList.replace('bg-slate-500', 'bg-purple-500');
            statusDot.classList.add('recording-pulse');

            const systemPrompt = "You are a real person having a spoken conversation with the user. Keep your responses extremely brief, conversational, and natural. Do not use markdown, lists, or special formatting because this will be read aloud by a text-to-speech engine.";

            try {
                if (selectedModel === 'gemini') {
                    // Gemini (Cloud API - Non-Streaming fallback)
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    const geminiHistory = chatHistory.map(msg => ({
                        role: msg.role === 'assistant' ? 'model' : 'user',
                        parts: [{ text: msg.content }]
                    }));

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            contents: geminiHistory
                        })
                    });

                    if (!response.ok) throw new Error('Gemini API failed');
                    const data = await response.json();
                    const aiResponse = data.candidates[0].content.parts[0].text;
                
                    appendMessageToChat('assistant', aiResponse);
                    statusText.innerText = "AI Speaking...";

                    // Chunk the full response to prevent TTS from crashing
                    const sentences = aiResponse.match(/[^.!?]+[.!?]+|\s*$/g).filter(s => s.trim());
                    if (sentences.length === 0) {
                        streamComplete = true;
                        checkConversationResume();
                    } else {
                        sentences.forEach(s => speakSentenceChunk(s));
                        streamComplete = true; 
                    }

                } else if (selectedModel.startsWith('ollama:')) {
                    // Ollama (Local AI - High-Speed Streaming)
                    const ollamaModelName = selectedModel.replace('ollama:', '');
                    
                    const placeholder = transcriptArea.querySelector('.italic');
                    if (placeholder) placeholder.remove();

                    // Create the live-typing message box
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'self-start bg-slate-800 border border-slate-700 text-slate-200 rounded-2xl rounded-tl-sm px-5 py-3 max-w-[85%] shadow-lg mr-auto';
                    transcriptArea.appendChild(msgDiv);

                    const response = await fetch('http://127.0.0.1:11434/api/chat', {
                        method: 'POST',
                        headers: { 
                            'Accept': 'application/json',
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify({
                            model: ollamaModelName,
                            messages: [
                                { role: 'system', content: systemPrompt },
                                ...chatHistory
                            ],
                            stream: true // Enabled!
                        })
                    });

                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`Ollama Error (${response.status}): ${errText}`);
                    }

                    statusText.innerText = "AI Speaking...";
                    
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder("utf-8");
                    let aiResponseText = "";
                    let sentenceBuffer = "";
                    let streamBuffer = ""; // Add buffer for incomplete chunks

                    // Stream Processor
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) {
                            streamComplete = true;
                            // Speak any leftover text
                            if (sentenceBuffer.trim()) {
                                speakSentenceChunk(sentenceBuffer);
                            } else {
                                checkConversationResume();
                            }
                            break;
                        }

                        // Safely combine new chunk with leftover incomplete data
                        streamBuffer += decoder.decode(value, { stream: true });
                        const lines = streamBuffer.split('\n');
                        
                        // Pop the last element (it might be an incomplete JSON string) and keep it in the buffer
                        streamBuffer = lines.pop();

                        for (const line of lines) {
                            if (!line.trim()) continue; // Skip empty lines
                            
                            try {
                                const json = JSON.parse(line);
                                const token = json.message?.content || "";

                                aiResponseText += token;
                                sentenceBuffer += token;
                                
                                // Update UI Live
                                msgDiv.innerText = aiResponseText;
                                transcriptArea.scrollTop = transcriptArea.scrollHeight;

                                // Break audio queue at punctuation boundaries for instant speech
                                if (/[.!?]\s/.test(sentenceBuffer) || /\n/.test(sentenceBuffer)) {
                                    speakSentenceChunk(sentenceBuffer);
                                    sentenceBuffer = "";
                                }
                            } catch (e) {
                                console.warn("Failed to parse stream chunk, skipping:", line);
                            }
                        }
                    }
                    chatHistory.push({ role: 'assistant', content: aiResponseText });
                }
                
            } catch (error) {
                console.error("AI Error:", error);
                appendMessageToChat('assistant', `Connection Error: ${error.message}. (Browser blocked the request or Ollama is unreachable)`);
                streamComplete = true; 
                checkConversationResume();
            }
        }

        function startRecording() {
            if (!recognition || isAITalking) return;
            
            if(synth.speaking || synth.pending) synth.cancel();
            
            finalTranscript = '';
            recognition.lang = languageSelect.value;
            try {
                recognition.start();
                startBtn.classList.add('hidden');
                stopBtn.classList.remove('hidden');
            } catch (e) {
                console.error("Recognition already started", e);
            }
        }

        function stopRecording() {
            if (!recognition) return;
            recognition.stop();
            if(synth.speaking || synth.pending) synth.cancel();
            
            isAITalking = false;
            window.speechUtterances = []; // Clear queue
            chunksSpeaking = 0;
            
            startBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
            updateUI();
        }

        function updateUI() {
            if (isAITalking) return; 

            if (isRecording) {
                startBtn.classList.add('hidden');
                stopBtn.classList.remove('hidden');
                
                statusIndicator.classList.remove('bg-slate-800/80', 'bg-purple-500/10');
                statusIndicator.classList.add('bg-red-500/10');
                
                statusIndicator.classList.remove('border-slate-700', 'border-purple-500/20');
                statusIndicator.classList.add('border-red-500/20');
                
                statusIndicator.classList.remove('text-slate-400', 'text-purple-400');
                statusIndicator.classList.add('text-red-400');
                
                statusDot.classList.remove('bg-slate-500', 'bg-purple-500');
                statusDot.classList.add('bg-red-500');
                statusDot.classList.replace('shadow-[0_0_8px_rgba(100,116,139,0.5)]', 'shadow-[0_0_12px_rgba(239,68,68,0.8)]');
                
                statusText.innerText = "Listening...";
            } else {
                startBtn.classList.remove('hidden');
                stopBtn.classList.add('hidden');
                
                statusIndicator.classList.remove('bg-red-500/10', 'bg-purple-500/10');
                statusIndicator.classList.add('bg-slate-800/80');
                
                statusIndicator.classList.remove('border-red-500/20', 'border-purple-500/20');
                statusIndicator.classList.add('border-slate-700');
                
                statusIndicator.classList.remove('text-red-400', 'text-purple-400');
                statusIndicator.classList.add('text-slate-400');
                
                statusDot.classList.remove('bg-red-500', 'bg-purple-500');
                statusDot.classList.add('bg-slate-500');
                statusDot.classList.replace('shadow-[0_0_12px_rgba(239,68,68,0.8)]', 'shadow-[0_0_8px_rgba(100,116,139,0.5)]');
                statusDot.classList.remove('recording-pulse');
                
                statusText.innerText = "Standby";
            }
        }

        function showError(msg) {
            errorMessage.innerText = msg;
            errorModal.classList.remove('hidden');
        }

        function showToast(message) {
            toastMsg.innerText = message;
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 16px)';
            }, 2500);
        }

        // Event Listeners
        startBtn.addEventListener('click', startRecording);
        stopBtn.addEventListener('click', stopRecording);
        
        // Fix for Chrome caching voices asynchronously
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => synth.getVoices();
        }

        languageSelect.addEventListener('change', () => {
            if (isRecording) {
                stopRecording();
                setTimeout(() => startRecording(), 300);
            }
        });

    </script>
</body>
</html>
